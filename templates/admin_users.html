<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Manage Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: 700; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 20px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #7a8ba3; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.95); }
        .btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; pointer-events: none; }
        .btn:active::before { width: 400px; height: 400px; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 10px; text-align: left; color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2332; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.superadmin { background: #3a2a1a; color: #f39c12; }
        .badge.admin { background: #1a2a3f; color: #3498db; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.inactive { background: #3a1a1a; color: #ff4757; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 12px; border-top: 1px solid #1a2332; padding-top: 15px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #7a8ba3; font-size: 13px; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><img src="/static/icons/icon-192.png" alt="BuSystem" class="logo-icon"> BuSystem</div>
        <a href="/admin/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>👑 Manage Users</h2>
    <p class="sub">Create and manage admin accounts (SuperAdmin only)</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Create Admin Account</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="userUsername" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="Email address">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="userPassword" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="userRole">
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="createUser()">👤 Create Admin</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px;">All Users</h3>
        <table>
            <thead>
                <tr><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr>
            </thead>
            <tbody id="usersList">
                <tr><td colspan="6" style="text-align:center; color:#4a5a6f; padding:20px;">Loading users...</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadUsers();
    
    function loadUsers() {
        fetch('/api/users')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('usersList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#4a5a6f; padding:20px;">No users found</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(u => `
                    <tr>
                        <td><strong>${u.username}</strong></td>
                        <td>${u.email || '-'}</td>
                        <td><span class="badge ${u.role}">${u.role}</span></td>
                        <td><span class="badge ${u.is_active ? 'active' : 'inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                        <td>${u.created_at ? u.created_at.split(' ')[0] : '-'}</td>
                        <td>
                            <div class="action-buttons">
                                ${u.username !== 'MCM' ? `<button class="btn-danger" onclick="deleteUser(${u.id})">Delete</button>` : 'SuperAdmin'}
                            </div>
                        </td>
                    </tr>
                `).join('');
            });
    }
    
    function createUser() {
        const username = document.getElementById('userUsername').value;
        const email = document.getElementById('userEmail').value;
        const password = document.getElementById('userPassword').value;
        const role = document.getElementById('userRole').value;
        
        if (!username || !password) {
            alert('Please enter username and password');
            return;
        }
        
        fetch('/api/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password, role })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert('✅ Admin created successfully!');
                document.getElementById('userUsername').value = '';
                document.getElementById('userEmail').value = '';
                document.getElementById('userPassword').value = '';
                loadUsers();
            } else {
                alert('❌ Error: ' + (data.error || 'Unknown error'));
            }
        });
    }
    
    function deleteUser(id) {
        if (!confirm('Delete this user?')) return;
        fetch('/api/users', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadUsers());
    }
</script>
</body>
</html>
