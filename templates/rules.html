<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Rules</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; background: #1a3a2a; color: #2ecc71; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .check-result { padding: 10px 14px; border-radius: 8px; margin-top: 10px; }
        .check-result.success { background: #0a1a0a; color: #2ecc71; border: 1px solid #1a3a2a; }
        .check-result.fail { background: #1a0a0a; color: #ff4757; border: 1px solid #3a1a1a; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📏 Rules</h2>
    <p class="sub">Set financial rules to enforce your strategy</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Financial Rule</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Rule Name</label>
                <input type="text" id="ruleName" placeholder="e.g., Investment Limit">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="ruleCategory">
                    <option value="investment">Investment</option>
                    <option value="spending">Spending</option>
                    <option value="emergency">Emergency</option>
                    <option value="savings">Savings</option>
                </select>
            </div>
            <div class="form-group">
                <label>Condition Type</label>
                <select id="ruleConditionType">
                    <option value="percentage">Percentage</option>
                    <option value="amount">Amount</option>
                    <option value="months">Months</option>
                </select>
            </div>
            <div class="form-group">
                <label>Condition Value</label>
                <input type="number" id="ruleValue" placeholder="e.g., 40" step="0.01">
            </div>
            <div class="form-group">
                <label>Condition Operator</label>
                <select id="ruleOperator">
                    <option value=">">Greater than (>)</option>
                    <option value="<">Less than (<)</option>
                    <option value=">=">Greater or equal (>=)</option>
                    <option value="<=">Less or equal (<=)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Action Message</label>
                <input type="text" id="ruleMessage" placeholder="Warning message">
            </div>
        </div>
        <button class="btn" onclick="addRule()">➕ Add Rule</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Rules</h3>
        <table>
            <thead>
                <tr><th>Name</th><th>Category</th><th>Condition</th><th>Message</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="rulesList">
                <tr><td colspan="6" style="text-align:center; color:#555; padding:20px;">No rules set</td></tr>
            </tbody>
        </table>
    </div>
    
    <div style="margin-top:15px;">
        <button class="btn" onclick="checkRules()">🔍 Check Rules</button>
        <div id="ruleResults"></div>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadRules();
    
    function loadRules() {
        fetch('/api/rules')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('rulesList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#555; padding:20px;">No rules set</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td><strong>${r.name}</strong></td>
                        <td>${r.category}</td>
                        <td>${r.condition_type} ${r.condition_operator} ${r.condition_value}</td>
                        <td>${r.action_message || '-'}</td>
                        <td><span class="badge">Active</span></td>
                        <td><button class="btn-danger" onclick="deleteRule(${r.id})">Delete</button></td>
                    </tr>
                `).join('');
            });
    }
    
    function addRule() {
        const name = document.getElementById('ruleName').value;
        const category = document.getElementById('ruleCategory').value;
        const condition_type = document.getElementById('ruleConditionType').value;
        const condition_value = document.getElementById('ruleValue').value;
        const condition_operator = document.getElementById('ruleOperator').value;
        const action_message = document.getElementById('ruleMessage').value;
        if (!name || !condition_value) { alert('Please enter rule name and condition value'); return; }
        fetch('/api/rules', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, category, condition_type, condition_value: parseFloat(condition_value), condition_operator, action_message })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('ruleName').value = '';
            document.getElementById('ruleValue').value = '';
            document.getElementById('ruleMessage').value = '';
            loadRules();
        });
    }
    
    function deleteRule(id) {
        if (!confirm('Delete this rule?')) return;
        fetch('/api/rules', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadRules());
    }
    
    function checkRules() {
        fetch('/api/rules/check')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('ruleResults');
                if (data.length === 0) {
                    container.innerHTML = '<div class="check-result success">✅ All rules passed!</div>';
                    return;
                }
                container.innerHTML = data.map(msg => 
                    `<div class="check-result fail">⚠️ ${msg}</div>`
                ).join('');
            });
    }
</script>
</body>
</html>
