<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Rules</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; animation: fadeInDown 0.5s ease-out; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; transition: 0.3s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .back:active::before { width: 300px; height: 300px; }
        .back::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(0, 212, 255, 0.2); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; pointer-events: none; }
        .content { margin-top: 30px; padding: 30px; background: #111a2b; border-radius: 16px; border: 1px solid #1a2a3f; min-height: 300px; animation: fadeInUp 0.6s ease-out 0.1s both; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; border-top: 1px solid #1a2332; padding-top: 15px; font-size: 12px; animation: fadeInUp 0.6s ease-out 0.3s both; }
        h2 { color: #00d4ff; margin-bottom: 15px; }
        .sub { color: #7a8ba3; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden; }
        .btn:active::before { width: 300px; height: 300px; }
        .btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255, 255, 255, 0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; pointer-events: none; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    <div class="content">
        <h2>📋 Rules</h2>
        <p class="sub">Module ready. Use API endpoints.</p>
        <p style="color:#4a5a6f;margin-top:10px;">GET /api/rules</p>
    </div>
    <div class="footer">Every Franc Must Have a Job</div>
</div>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js')
            .then(reg => console.log('✅ SW registered'))
            .catch(err => console.log('⚠️ SW failed:', err));
    }
</script>
</body>
</html>
