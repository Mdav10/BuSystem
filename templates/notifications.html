<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - ${template^}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 20px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #7a8ba3; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:active { transform: scale(0.95); }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-success:active { transform: scale(0.95); }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 10px; text-align: left; color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2332; font-size: 13px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 11px; border-top: 1px solid #1a2332; padding-top: 12px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #7a8ba3; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.pending { background: #3a3a1a; color: #f39c12; }
        .badge.paid { background: #1a2a3f; color: #3498db; }
        .badge.sold { background: #1a2a3f; color: #3498db; }
        .badge.running { background: #1a3a2a; color: #2ecc71; }
        .data-item { background: #0f1a2b; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #1a2332; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .data-item .key { color: #7a8ba3; font-size: 11px; }
        .data-item .value { color: #00d4ff; font-weight: bold; font-size: 13px; }
        .empty-state { color: #4a5a6f; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>${template^}</h2>
    <p class="sub">Manage your ${template} here</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add ${template^}</h3>
        <div id="formContainer">
            <p style="color:#7a8ba3; font-size:13px;">Add functionality available via API</p>
            <button class="btn" onclick="loadData()" style="margin-top:10px;">🔄 Refresh Data</button>
        </div>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your ${template^}</h3>
        <div id="dataContainer">
            <div class="empty-state">Loading data...</div>
        </div>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadData();
    
    function loadData() {
        const container = document.getElementById('dataContainer');
        container.innerHTML = '<div class="empty-state">Loading...</div>';
        fetch('/api/${template}')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-state">No data found. Start adding your ${template}!</div>';
                    return;
                }
                container.innerHTML = data.map(item => {
                    const fields = Object.keys(item);
                    return '<div class="data-item">' + 
                        fields.map(f => '<span><span class="key">' + f + ':</span> <span class="value">' + (item[f] !== null && item[f] !== undefined ? item[f] : '-') + '</span></span>').join('') +
                        '</div>';
                }).join('');
            })
            .catch(err => {
                container.innerHTML = '<div class="empty-state">Error loading data</div>';
            });
    }
</script>
</body>
</html>
