<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Risk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .content { background: #111; border-radius: 16px; padding: 24px; border: 1px solid #222; margin: 20px 0; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .btn { background: #00d4ff; color: #000; padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .risk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin: 10px 0; }
        .risk-card { background: #0a0e17; padding: 16px; border-radius: 12px; text-align: center; border: 1px solid #1a1a1a; }
        .risk-card .label { color: #888; font-size: 11px; text-transform: uppercase; }
        .risk-card .value { font-size: 22px; font-weight: bold; margin-top: 6px; }
        .risk-card .value.low { color: #2ecc71; }
        .risk-card .value.medium { color: #f39c12; }
        .risk-card .value.high { color: #ff4757; }
        .risk-card .value.blue { color: #3498db; }
        .overall { font-size: 28px; text-align: center; padding: 16px; border-radius: 12px; background: #0a0e17; border: 1px solid #1a1a1a; }
        .overall .low { color: #2ecc71; }
        .overall .medium { color: #f39c12; }
        .overall .high { color: #ff4757; }
        @media (max-width: 600px) { .risk-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>⚠️ Risk Manager</h2>
    <p class="sub">Assess your financial risks</p>
    
    <div class="content">
        <div class="overall" id="overallRisk">Loading risk assessment...</div>
    </div>
    
    <div class="content">
        <div class="risk-grid" id="riskContainer">
            <div class="risk-card"><div class="label">Loading...</div><div class="value">-</div></div>
        </div>
        <button class="btn" onclick="loadRisk()">🔄 Refresh</button>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadRisk();
    
    function loadRisk() {
        fetch('/api/risk')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('riskContainer');
                const items = [
                    { label: 'High Risk', value: data.high_risk_investments, cls: data.high_risk_investments > 2 ? 'high' : 'low' },
                    { label: 'Medium Risk', value: data.medium_risk_investments, cls: 'medium' },
                    { label: 'Low Risk', value: data.low_risk_investments, cls: 'low' },
                    { label: 'Cash Reserve', value: data.cash_reserve.toLocaleString() + ' FCFA', cls: 'blue' },
                    { label: 'Diversification', value: data.diversification_score.toFixed(0) + '%', cls: data.diversification_score > 70 ? 'low' : data.diversification_score > 40 ? 'medium' : 'high' }
                ];
                container.innerHTML = items.map(item => `
                    <div class="risk-card">
                        <div class="label">${item.label}</div>
                        <div class="value ${item.cls}">${item.value}</div>
                    </div>
                `).join('');
                
                const overall = document.getElementById('overallRisk');
                const risk = data.overall_risk || 'Unknown';
                const color = risk === 'Low' ? '#2ecc71' : risk === 'Medium' ? '#f39c12' : '#ff4757';
                overall.innerHTML = `Overall Risk Level: <span style="color:${color};">${risk}</span>`;
            });
    }
</script>
</body>
</html>
