<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Risk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        @media (max-width: 600px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
        h2 { color: #00d4ff; margin: 20px 0; }
        .risk-card { background: #0f1a2b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #1a2332; }
        .risk-card .label { color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        .risk-card .value { font-size: 28px; font-weight: bold; margin-top: 8px; }
        .risk-card .value.low { color: #2ecc71; }
        .risk-card .value.medium { color: #f39c12; }
        .risk-card .value.high { color: #ff4757; }
        .risk-card .value.blue { color: #3498db; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .overall { font-size: 32px; text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>⚠️ Risk Manager</h2>
    
    <div class="card">
        <div class="overall" id="overallRisk">Loading risk assessment...</div>
    </div>
    
    <div class="card">
        <div class="grid-3" id="riskContainer">
            <div class="risk-card"><div class="label">Loading...</div><div class="value">-</div></div>
        </div>
    </div>
    
    <button class="btn" onclick="loadRisk()">🔄 Refresh Risk Analysis</button>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    loadRisk();
    
    function loadRisk() {
        fetch('/api/risk')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('riskContainer');
                const items = [
                    { label: 'High Risk Investments', value: data.high_risk_investments, cls: data.high_risk_investments > 2 ? 'high' : 'low' },
                    { label: 'Medium Risk Investments', value: data.medium_risk_investments, cls: 'medium' },
                    { label: 'Low Risk Investments', value: data.low_risk_investments, cls: 'low' },
                    { label: 'Cash Reserve', value: data.cash_reserve.toLocaleString() + ' FCFA', cls: 'blue' },
                    { label: 'Diversification Score', value: data.diversification_score.toFixed(0) + '%', cls: data.diversification_score > 70 ? 'low' : data.diversification_score > 40 ? 'medium' : 'high' }
                ];
                container.innerHTML = items.map(item => `
                    <div class="risk-card">
                        <div class="label">${item.label}</div>
                        <div class="value ${item.cls}">${item.value}</div>
                    </div>
                `).join('');
                
                const overall = document.getElementById('overallRisk');
                const risk = data.overall_risk || 'Unknown';
                const color = risk === 'Low' ? '#2ecc71' : risk === 'Medium' ? '#f39c12' : '#ff4757';
                overall.innerHTML = `Overall Risk Level: <span style="color:${color};">${risk}</span>`;
            });
    }
</script>
</body>
</html>
