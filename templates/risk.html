<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Risk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .content { background: #111; border-radius: 16px; padding: 24px; border: 1px solid #222; margin: 20px 0; min-height: 200px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .btn { background: #00d4ff; color: #000; padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .data-item { background: #0a0e17; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .data-item .key { color: #888; font-size: 11px; }
        .data-item .value { color: #00d4ff; font-weight: bold; font-size: 13px; }
        .empty { color: #555; text-align: center; padding: 30px 0; }
        .api { background: #0a0e17; padding: 10px; border-radius: 8px; font-family: monospace; color: #00d4ff; border: 1px solid #1a1a1a; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    <h2>📋 Risk</h2>
    <p class="sub">View your risk data</p>
    <div class="content">
        <div class="api">📡 API: GET /api/risk</div>
        <div id="dataContainer"><div class="empty">Loading data...</div></div>
        <button class="btn" onclick="loadData()">🔄 Refresh</button>
    </div>
    <div class="footer">Every Franc Must Have a Job</div>
</div>
<script>
    function loadData() {
        const container = document.getElementById('dataContainer');
        container.innerHTML = '<div class="empty">Loading...</div>';
        fetch('/api/risk')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No data found</div>';
                    return;
                }
                container.innerHTML = data.map(item => {
                    const fields = Object.keys(item);
                    return '<div class="data-item">' + 
                        fields.map(f => '<span><span class="key">' + f + ':</span> <span class="value">' + (item[f] !== null && item[f] !== undefined ? item[f] : '-') + '</span></span>').join('') +
                        '</div>';
                }).join('');
            })
            .catch(() => {
                container.innerHTML = '<div class="empty">Error loading data</div>';
            });
    }
    loadData();
</script>
</body>
</html>
