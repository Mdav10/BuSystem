<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e6ed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .offline-box { max-width: 400px; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #00d4ff; margin-bottom: 10px; }
        p { color: #7a8ba3; margin-bottom: 20px; line-height: 1.6; }
        .btn {
            background: #00d4ff;
            color: #0a0e17;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #00ff88; }
    </style>
</head>
<body>
<div class="offline-box">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection. BuSystem will work once you're back online.</p>
    <button class="btn" onclick="location.reload()">🔄 Retry Connection</button>
    <p style="margin-top:20px;font-size:12px;color:#4a5a6f;">BuSystem v1.0 • Every Franc Must Have a Job</p>
</div>
</body>
</html>
