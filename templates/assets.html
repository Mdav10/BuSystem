<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Assets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; background: #1a2a3f; color: #888; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: #111; padding: 12px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .stat-card .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .green { color: #2ecc71; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>🏦 Assets</h2>
    <p class="sub">Track everything you own</p>
    
    <div class="stats">
        <div class="stat-card"><div class="label">Total Assets Value</div><div class="value green" id="totalAssets">0 BIF</div></div>
        <div class="stat-card"><div class="label">Total Assets Count</div><div class="value" id="assetCount">0</div></div>
    </div>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Asset</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="assetName" placeholder="e.g., Land, Shop">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="assetCategory">
                    <option value="Cash">Cash</option>
                    <option value="Land">Land</option>
                    <option value="Building">Building</option>
                    <option value="Vehicle">Vehicle</option>
                    <option value="Livestock">Livestock</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Purchase Price (BIF)</label>
                <input type="number" id="assetPrice" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Current Value (BIF)</label>
                <input type="number" id="assetValue" placeholder="Current value" step="0.01">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="assetLocation" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Condition</label>
                <select id="assetCondition">
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                    <option value="Fair">Fair</option>
                    <option value="Poor">Poor</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="addAsset()">➕ Add Asset</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Assets</h3>
        <table>
            <thead>
                <tr><th>Name</th><th>Category</th><th>Purchase Price</th><th>Current Value</th><th>Location</th><th>Condition</th><th>Action</th></tr>
            </thead>
            <tbody id="assetsList">
                <tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No assets yet</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadAssets();
    
    function loadAssets() {
        fetch('/api/assets')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('assetsList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No assets yet</td></tr>';
                    updateStats([]);
                    return;
                }
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td><strong>${a.name}</strong></td>
                        <td>${a.category}</td>
                        <td>${Number(a.purchase_price).toLocaleString()} BIF</td>
                        <td>${Number(a.current_value).toLocaleString()} BIF</td>
                        <td>${a.location || '-'}</td>
                        <td><span class="badge">${a.condition}</span></td>
                        <td><button class="btn-danger" onclick="deleteAsset(${a.id})">Delete</button></td>
                    </tr>
                `).join('');
                updateStats(data);
            });
    }
    
    function updateStats(data) {
        let total = 0;
        data.forEach(a => total += Number(a.current_value));
        document.getElementById('totalAssets').textContent = total.toLocaleString() + ' BIF';
        document.getElementById('assetCount').textContent = data.length;
    }
    
    function addAsset() {
        const name = document.getElementById('assetName').value;
        const category = document.getElementById('assetCategory').value;
        const purchase_price = document.getElementById('assetPrice').value;
        const current_value = document.getElementById('assetValue').value;
        const location = document.getElementById('assetLocation').value;
        const condition = document.getElementById('assetCondition').value;
        if (!name || !purchase_price || purchase_price <= 0) { alert('Please enter name and valid purchase price'); return; }
        fetch('/api/assets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, category, purchase_price: parseFloat(purchase_price), current_value: parseFloat(current_value) || parseFloat(purchase_price), location, condition })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('assetName').value = '';
            document.getElementById('assetPrice').value = '';
            document.getElementById('assetValue').value = '';
            document.getElementById('assetLocation').value = '';
            loadAssets();
        });
    }
    
    function deleteAsset(id) {
        if (!confirm('Delete this asset?')) return;
        fetch('/api/assets', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadAssets());
    }
</script>
</body>
</html>
