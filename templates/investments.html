<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Investments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-success { background: #2ecc71; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-warning { background: #f39c12; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.running { background: #1a3a2a; color: #2ecc71; }
        .badge.sold { background: #1a2a3f; color: #3498db; }
        .badge.lost { background: #3a1a1a; color: #ff4757; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: #111; padding: 12px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .stat-card .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .green { color: #2ecc71; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📈 Investments</h2>
    <p class="sub">Track your investments</p>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="label">Total Invested</div><div class="value green" id="totalInvested">0 BIF</div></div>
        <div class="stat-card"><div class="label">Active</div><div class="value" id="activeCount">0</div></div>
        <div class="stat-card"><div class="label">Total Profit</div><div class="value green" id="totalProfit">0 BIF</div></div>
    </div>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Investment</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Type</label>
                <select id="invType">
                    <option value="Animal">Animal</option>
                    <option value="Crop">Crop</option>
                    <option value="Business">Business</option>
                    <option value="Stock">Stock</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sub Type</label>
                <input type="text" id="invSubType" placeholder="e.g., Turkey">
            </div>
            <div class="form-group">
                <label>Capital (BIF)</label>
                <input type="number" id="invCapital" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Expected ROI (%)</label>
                <input type="number" id="invROI" placeholder="e.g., 50" step="0.01">
            </div>
            <div class="form-group">
                <label>Purchase Date</label>
                <input type="date" id="invDate">
            </div>
            <div class="form-group">
                <label>Expected Exit Date</label>
                <input type="date" id="invExitDate">
            </div>
        </div>
        <button class="btn" onclick="addInvestment()">➕ Add Investment</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Investments</h3>
        <table>
            <thead>
                <tr><th>ID</th><th>Type</th><th>Capital</th><th>Status</th><th>Profit</th><th>ROI</th><th>Actions</th></tr>
            </thead>
            <tbody id="investmentsList">
                <tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No investments yet</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    document.getElementById('invDate').value = new Date().toISOString().split('T')[0];
    loadInvestments();
    
    function loadInvestments() {
        fetch('/api/investments')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('investmentsList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No investments yet</td></tr>';
                    updateStats([]);
                    return;
                }
                tbody.innerHTML = data.map(i => `
                    <tr>
                        <td><strong>${i.investment_id}</strong></td>
                        <td>${i.type}${i.sub_type ? ' ('+i.sub_type+')' : ''}</td>
                        <td>${Number(i.capital).toLocaleString()} FCFA</td>
                        <td><span class="badge ${i.status.toLowerCase()}">${i.status}</span></td>
                        <td style="color:${i.profit >= 0 ? '#2ecc71' : '#ff4757'}">${Number(i.profit).toLocaleString()} FCFA</td>
                        <td>${i.roi_actual ? Number(i.roi_actual).toFixed(1) + '%' : '-'}</td>
                        <td>
                            <div class="action-buttons">
                                ${i.status === 'Running' ? `<button class="btn-success" onclick="sellInvestment(${i.id})">Sell</button>` : ''}
                                <button class="btn-danger" onclick="deleteInvestment(${i.id})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                updateStats(data);
            });
    }
    
    function updateStats(data) {
        let total = 0, active = 0, profit = 0;
        data.forEach(i => {
            total += Number(i.capital);
            if (i.status === 'Running') active++;
            profit += Number(i.profit);
        });
        document.getElementById('totalInvested').textContent = total.toLocaleString() + ' FCFA';
        document.getElementById('activeCount').textContent = active;
        document.getElementById('totalProfit').textContent = profit.toLocaleString() + ' FCFA';
    }
    
    function addInvestment() {
        const type = document.getElementById('invType').value;
        const sub_type = document.getElementById('invSubType').value;
        const capital = document.getElementById('invCapital').value;
        const expected_roi = document.getElementById('invROI').value;
        const purchase_date = document.getElementById('invDate').value;
        const expected_exit_date = document.getElementById('invExitDate').value;
        if (!capital || capital <= 0) { alert('Please enter a valid capital amount'); return; }
        fetch('/api/investments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, sub_type, capital: parseFloat(capital), expected_roi: parseFloat(expected_roi) || 0, purchase_date, expected_exit_date })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('invCapital').value = '';
            document.getElementById('invSubType').value = '';
            document.getElementById('invROI').value = '';
            loadInvestments();
        });
    }
    
    function sellInvestment(id) {
        const price = prompt('💰 Enter sell price (FCFA):');
        if (price === null) return;
        if (!price || parseFloat(price) <= 0) { alert('Please enter a valid sell price'); return; }
        if (!confirm(`Sell this investment for ${parseFloat(price).toLocaleString()} FCFA?`)) return;
        
        fetch(`/api/investments/${id}/sell`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sell_price: parseFloat(price) })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(`✅ Sold! Profit: ${data.profit.toLocaleString()} FCFA | ROI: ${data.roi.toFixed(1)}%`);
                loadInvestments();
            }
        })
        .catch(err => {
            alert('❌ Error selling investment');
            console.error(err);
        });
    }
    
    function deleteInvestment(id) {
        if (!confirm('Delete this investment permanently?')) return;
        fetch('/api/investments', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadInvestments());
    }
</script>
</body>
</html>
