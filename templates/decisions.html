<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Decisions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .content { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; min-height: 300px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .btn { background: #00d4ff; color: #000; padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .decision-card { background: #0a0e17; padding: 16px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .decision-card .title { font-size: 16px; font-weight: bold; color: #00d4ff; }
        .decision-card .message { color: #888; margin-top: 6px; font-size: 14px; }
        .decision-card .type { display: inline-block; padding: 2px 12px; border-radius: 10px; font-size: 11px; margin-top: 8px; }
        .decision-card .type.opportunity { background: #1a3a2a; color: #2ecc71; }
        .decision-card .type.warning { background: #3a2a1a; color: #f39c12; }
        .decision-card .type.alert { background: #3a1a1a; color: #ff4757; }
        .empty { color: #555; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>🧠 AI Decision Engine</h2>
    <p class="sub">Smart recommendations based on your data</p>
    
    <div class="content">
        <div id="decisionsContainer">
            <div class="empty">Analyzing your financial data...</div>
        </div>
        <button class="btn" onclick="loadDecisions()">🔄 Refresh</button>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadDecisions();
    
    function loadDecisions() {
        const container = document.getElementById('decisionsContainer');
        container.innerHTML = '<div class="empty">Analyzing...</div>';
        fetch('/api/decisions')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No recommendations yet. Add more data!</div>';
                    return;
                }
                container.innerHTML = data.map(d => `
                    <div class="decision-card">
                        <div class="title">${d.title}</div>
                        <div class="message">${d.message}</div>
                        <span class="type ${d.type}">${d.type.toUpperCase()}</span>
                    </div>
                `).join('');
            })
            .catch(() => {
                container.innerHTML = '<div class="empty">Error loading recommendations</div>';
            });
    }
</script>
</body>
</html>
