<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Decisions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        h2 { color: #00d4ff; margin: 20px 0; }
        .card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 15px 0; }
        .card .title { font-size: 18px; font-weight: bold; }
        .card .message { color: #7a8ba3; margin-top: 8px; line-height: 1.6; }
        .card .type { display: inline-block; padding: 4px 14px; border-radius: 12px; font-size: 12px; margin-top: 10px; }
        .type.opportunity { background: #1a3a2a; color: #2ecc71; }
        .type.warning { background: #3a2a1a; color: #f39c12; }
        .type.alert { background: #3a1a1a; color: #ff4757; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .empty { text-align: center; color: #4a5a6f; padding: 40px 0; }
        .loading { text-align: center; color: #7a8ba3; padding: 40px 0; }
        .stat { display: inline-block; padding: 2px 10px; border-radius: 4px; font-weight: bold; }
        .stat.good { color: #2ecc71; }
        .stat.warn { color: #f39c12; }
        .stat.bad { color: #ff4757; }
        .footer { margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>🧠 AI Decision Engine</h2>
    <p style="color:#7a8ba3; margin-bottom:20px;">Smart recommendations based on your financial data</p>
    
    <div id="decisionsContainer">
        <div class="loading">🔄 Analyzing your financial data...</div>
    </div>
    
    <button class="btn" onclick="loadDecisions()" style="margin-top:10px;">🔄 Refresh Recommendations</button>
    
    <div class="footer">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    loadDecisions();
    
    function loadDecisions() {
        const container = document.getElementById('decisionsContainer');
        container.innerHTML = '<div class="loading">🔄 Analyzing your financial data...</div>';
        
        fetch('/api/decisions')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = `<div class="empty">📊 No recommendations yet. Add more data to get personalized advice!</div>`;
                    return;
                }
                container.innerHTML = data.map(d => `
                    <div class="card">
                        <div class="title">${d.title}</div>
                        <div class="message">${d.message}</div>
                        <span class="type ${d.type}">${d.type.toUpperCase()}</span>
                    </div>
                `).join('');
            })
            .catch(err => {
                container.innerHTML = `<div class="empty">❌ Error loading decisions. Please try again.</div>`;
                console.error('Error:', err);
            });
    }
</script>
</body>
</html>
