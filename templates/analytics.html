<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        h2 { color: #00d4ff; margin: 20px 0; }
        .chart-container { background: #0f1a2b; padding: 20px; border-radius: 12px; margin: 10px 0; min-height: 200px; }
        .bar { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .bar-label { min-width: 80px; color: #7a8ba3; font-size: 13px; }
        .bar-track { flex: 1; height: 24px; background: #1a2332; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); border-radius: 4px; transition: width 0.8s; }
        .bar-value { min-width: 60px; text-align: right; font-size: 13px; }
        .bar-fill.income { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .bar-fill.expense { background: linear-gradient(90deg, #ff4757, #ff6b81); }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .stat-box { background: #0f1a2b; padding: 15px; border-radius: 12px; border-left: 4px solid #00d4ff; }
        .stat-box .label { color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        .stat-box .value { font-size: 20px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📊 Analytics</h2>
    
    <div class="grid-2">
        <div class="card">
            <h3 style="color: #fff;">Monthly Income</h3>
            <div id="monthlyIncomeChart" class="chart-container">
                <div style="color:#4a5a6f; text-align:center; padding:40px 0;">Loading data...</div>
            </div>
        </div>
        
        <div class="card">
            <h3 style="color: #fff;">Asset Distribution</h3>
            <div id="assetDistribution" class="chart-container">
                <div style="color:#4a5a6f; text-align:center; padding:40px 0;">Loading data...</div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h3 style="color: #fff;">Goal Progress</h3>
        <div id="goalProgress" class="chart-container">
            <div style="color:#4a5a6f; text-align:center; padding:20px 0;">No goals set</div>
        </div>
    </div>
    
    <button class="btn" onclick="loadAllAnalytics()" style="margin-top:10px;">🔄 Refresh All</button>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    loadAllAnalytics();
    
    function loadAllAnalytics() {
        loadMonthlyIncome();
        loadAssetDistribution();
        loadGoalProgress();
    }
    
    function loadMonthlyIncome() {
        fetch('/api/analytics/monthly_income')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('monthlyIncomeChart');
                if (data.length === 0) {
                    container.innerHTML = '<div style="color:#4a5a6f; text-align:center; padding:40px 0;">No income data for this year</div>';
                    return;
                }
                const maxVal = Math.max(...data.map(d => d.total), 1);
                container.innerHTML = data.map(d => `
                    <div class="bar">
                        <span class="bar-label">${getMonthName(d.month)}</span>
                        <div class="bar-track">
                            <div class="bar-fill income" style="width: ${(d.total / maxVal) * 100}%;"></div>
                        </div>
                        <span class="bar-value">${d.total.toLocaleString()}</span>
                    </div>
                `).join('');
            });
    }
    
    function loadAssetDistribution() {
        fetch('/api/analytics/asset_distribution')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('assetDistribution');
                if (data.length === 0) {
                    container.innerHTML = '<div style="color:#4a5a6f; text-align:center; padding:40px 0;">No assets yet</div>';
                    return;
                }
                const maxVal = Math.max(...data.map(d => d.total), 1);
                container.innerHTML = data.map(d => `
                    <div class="bar">
                        <span class="bar-label">${d.category}</span>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${(d.total / maxVal) * 100}%;"></div>
                        </div>
                        <span class="bar-value">${d.total.toLocaleString()}</span>
                    </div>
                `).join('');
            });
    }
    
    function loadGoalProgress() {
        fetch('/api/goals')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('goalProgress');
                if (data.length === 0) {
                    container.innerHTML = '<div style="color:#4a5a6f; text-align:center; padding:20px 0;">No goals set</div>';
                    return;
                }
                container.innerHTML = data.map(g => `
                    <div class="bar">
                        <span class="bar-label">${g.name}</span>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${g.progress}%;"></div>
                        </div>
                        <span class="bar-value">${g.progress.toFixed(0)}%</span>
                    </div>
                `).join('');
            });
    }
    
    function getMonthName(month) {
        const names = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return names[month - 1] || month;
    }
</script>
</body>
</html>
