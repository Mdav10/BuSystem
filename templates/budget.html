<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - budget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-512.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; animation: fadeInDown 0.5s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
        .back {
            color: #7a8ba3;
            text-decoration: none;
            padding: 8px 16px;
            background: #1a2a3f;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .back:active { transform: scale(0.95); }
        .back::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        .back:active::before { width: 300px; height: 300px; }
        .content { margin-top: 30px; padding: 30px; background: #111a2b; border-radius: 16px; border: 1px solid #1a2a3f; min-height: 300px; animation: fadeInUp 0.6s ease-out 0.1s both; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 11px; border-top: 1px solid #1a2332; padding-top: 12px; animation: fadeInUp 0.6s ease-out 0.3s both; }
        h2 { color: #00d4ff; margin-bottom: 5px; font-size: 22px; }
        .sub { color: #7a8ba3; font-size: 13px; }
        .btn {
            background: #00d4ff;
            color: #0a0e17;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            font-size: 14px;
        }
        .btn:active { transform: scale(0.95); }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        .btn:active::before { width: 400px; height: 400px; }
        .btn:hover { background: #00ff88; transform: scale(1.02); }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #ff6b81; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-success:hover { background: #27ae60; }
        .data-list { margin-top: 15px; }
        .data-item {
            background: #0f1a2b;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid #1a2332;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            animation: fadeInUp 0.4s ease-out both;
        }
        .data-item .key { color: #7a8ba3; font-size: 11px; }
        .data-item .value { color: #00d4ff; font-weight: bold; font-size: 13px; }
        .empty-state { color: #4a5a6f; text-align: center; padding: 30px 0; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 20px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #7a8ba3; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.income { background: #1a3a2a; color: #2ecc71; }
        .badge.expense { background: #3a1a1a; color: #ff4757; }
        .badge.running { background: #1a3a2a; color: #2ecc71; }
        .badge.sold { background: #1a2a3f; color: #3498db; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.pending { background: #3a3a1a; color: #f39c12; }
        .badge.paid { background: #1a2a3f; color: #3498db; }
        .badge.over { background: #3a1a1a; color: #ff4757; }
        .badge.under { background: #1a3a2a; color: #2ecc71; }
        .badge.on-track { background: #1a2a3f; color: #f39c12; }
        .amount-positive { color: #2ecc71; }
        .amount-negative { color: #ff4757; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: #111a2b; padding: 12px; border-radius: 10px; border: 1px solid #1a2a3f; text-align: center; }
        .stat-card .label { font-size: 10px; color: #7a8ba3; text-transform: uppercase; }
        .stat-card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .stat-card .value.green { color: #2ecc71; }
        .stat-card .value.red { color: #ff4757; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 10px; text-align: left; color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2332; font-size: 13px; }
        .api-endpoint { background: #0f1a2b; padding: 10px 14px; border-radius: 8px; font-family: monospace; color: #00d4ff; border: 1px solid #1a2a3f; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><img src="/static/icons/icon-192.png" alt="BuSystem" class="logo-icon"> BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    <div class="content">
        <h2>📋 budget</h2>
        <p class="sub">Manage your budget here</p>
        
        <div class="api-endpoint">📡 API: GET /api/budget</div>
        
        <div id="dataContainer">
            <div class="empty-state">Loading data...</div>
        </div>
        
        <button class="btn" onclick="loadData()" style="margin-top:15px;">🔄 Refresh Data</button>
    </div>
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    function loadData() {
        const container = document.getElementById('dataContainer');
        container.innerHTML = '<div class="empty-state">Loading...</div>';
        fetch('/api/budget')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-state">No data found. Start adding your budget!</div>';
                    return;
                }
                container.innerHTML = data.map(item => {
                    const fields = Object.keys(item);
                    return '<div class="data-item">' + 
                        fields.map(f => '<span><span class="key">' + f + ':</span> <span class="value">' + (item[f] !== null && item[f] !== undefined ? item[f] : '-') + '</span></span>').join('') +
                        '</div>';
                }).join('');
            })
            .catch(err => {
                container.innerHTML = '<div class="empty-state">Error loading data</div>';
            });
    }
    loadData();
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.querySelector('.footer').textContent = 'BuSystem • Installed as App';
    }
</script>
</body>
</html>
