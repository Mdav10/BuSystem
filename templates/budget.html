<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Budget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-success { background: #2ecc71; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-warning { background: #f39c12; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-info { background: #3498db; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.pending { background: #3a3a1a; color: #f39c12; }
        .badge.done { background: #1a3a2a; color: #2ecc71; }
        .badge.not_done { background: #3a1a1a; color: #ff4757; }
        .badge.over { background: #3a1a1a; color: #ff4757; }
        .badge.under { background: #1a3a2a; color: #2ecc71; }
        .badge.on-track { background: #1a2a3f; color: #f39c12; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .over { color: #ff4757; }
        .under { color: #2ecc71; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .review-status { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .review-status.done { background: #1a3a2a; color: #2ecc71; }
        .review-status.not_done { background: #3a1a1a; color: #ff4757; }
        .review-status.pending { background: #3a3a1a; color: #f39c12; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📋 Budget</h2>
    <p class="sub">Plan your monthly spending</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Set Monthly Budget</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Category</label>
                <select id="budgetCategory">
                    <option value="Food">Food</option>
                    <option value="Internet">Internet</option>
                    <option value="Transport">Transport</option>
                    <option value="Family">Family</option>
                    <option value="Investment">Investment</option>
                    <option value="Emergency">Emergency</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Education">Education</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="budgetType">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                    <option value="investment">Investment</option>
                </select>
            </div>
            <div class="form-group">
                <label>Expected Amount (BIF)</label>
                <input type="number" id="budgetExpected" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Month</label>
                <select id="budgetMonth">
                    <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                    <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                    <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                    <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year</label>
                <input type="number" id="budgetYear" value="2026">
            </div>
        </div>
        <button class="btn" onclick="setBudget()">💰 Set Budget</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Budgets</h3>
        <table>
            <thead>
                <tr><th>Category</th><th>Type</th><th>Expected</th><th>Actual</th><th>Difference</th><th>Status</th><th>Review</th><th>Action</th></tr>
            </thead>
            <tbody id="budgetList">
                <tr><td colspan="8" style="text-align:center; color:#555; padding:20px;">No budgets set</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    const now = new Date();
    document.getElementById('budgetMonth').value = now.getMonth() + 1;
    document.getElementById('budgetYear').value = now.getFullYear();
    loadBudget();
    
    function loadBudget() {
        fetch('/api/budget')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('budgetList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#555; padding:20px;">No budgets set</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(b => {
                    const diff = b.actual_amount - b.expected_amount;
                    const status = diff > 0 ? 'Over' : diff < 0 ? 'Under' : 'On Track';
                    const cls = diff > 0 ? 'over' : diff < 0 ? 'under' : '';
                    const badgeCls = diff > 0 ? 'over' : diff < 0 ? 'under' : 'on-track';
                    
                    // Review status
                    const reviewStatus = b.status || 'pending';
                    const statusLabel = reviewStatus === 'done' ? '✅ Done' : reviewStatus === 'not_done' ? '❌ Not Done' : '⏳ Pending';
                    const statusCls = reviewStatus === 'done' ? 'done' : reviewStatus === 'not_done' ? 'not_done' : 'pending';
                    
                    const monthName = new Date(parseInt(b.year), parseInt(b.month) - 1, 1).toLocaleString('default', { month: 'long' });
                    
                    return `<tr>
                        <td><strong>${b.category}</strong></td>
                        <td>${b.type}</td>
                        <td>${Number(b.expected_amount).toLocaleString()} BIF</td>
                        <td>${Number(b.actual_amount).toLocaleString()} BIF</td>
                        <td class="${cls}">${diff > 0 ? '+' : ''}${Number(diff).toLocaleString()} BIF</td>
                        <td><span class="badge ${badgeCls}">${status}</span></td>
                        <td>
                            <span class="review-status ${statusCls}">${statusLabel}</span>
                            <div class="action-buttons" style="margin-top:4px;">
                                ${reviewStatus !== 'done' ? `<button class="btn-success" onclick="updateBudgetStatus(${b.id}, 'done')">✅ Well Done</button>` : ''}
                                ${reviewStatus !== 'not_done' ? `<button class="btn-danger" onclick="updateBudgetStatus(${b.id}, 'not_done')">❌ Not Done</button>` : ''}
                                ${reviewStatus !== 'pending' ? `<button class="btn-info" onclick="updateBudgetStatus(${b.id}, 'pending')">⏳ Reset</button>` : ''}
                            </div>
                        </td>
                        <td>
                            <button class="btn-danger" onclick="deleteBudget(${b.id})">Delete</button>
                        </td>
                    </tr>`;
                }).join('');
            });
    }
    
    function setBudget() {
        const category = document.getElementById('budgetCategory').value;
        const type = document.getElementById('budgetType').value;
        const expected_amount = document.getElementById('budgetExpected').value;
        const month = parseInt(document.getElementById('budgetMonth').value);
        const year = parseInt(document.getElementById('budgetYear').value);
        if (!expected_amount || expected_amount <= 0) { alert('Please enter a valid amount'); return; }
        fetch('/api/budget', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ category, type, expected_amount: parseFloat(expected_amount), month, year })
        })
        .then(() => {
            document.getElementById('budgetExpected').value = '';
            loadBudget();
        });
    }
    
    function updateBudgetStatus(id, status) {
        const label = status === 'done' ? 'Well Done ✅' : status === 'not_done' ? 'Not Done ❌' : 'Pending ⏳';
        if (!confirm(`Mark this budget as "${label}"?`)) return;
        fetch(`/api/budget/${id}/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: status })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(`✅ Budget marked as "${label}"!`);
                loadBudget();
            }
        })
        .catch(err => {
            alert('❌ Error updating status');
            console.error(err);
        });
    }
    
    function deleteBudget(id) {
        if (!confirm('Delete this budget?')) return;
        fetch('/api/budget', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadBudget());
    }
</script>
</body>
</html>
