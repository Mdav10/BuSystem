<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Liabilities</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-success { background: #2ecc71; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.owes_me { background: #1a2a3f; color: #3498db; }
        .badge.i_owe { background: #3a1a1a; color: #ff4757; }
        .badge.pending { background: #3a3a1a; color: #f39c12; }
        .badge.paid { background: #1a3a2a; color: #2ecc71; }
        .badge.overdue { background: #3a1a1a; color: #ff4757; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: #111; padding: 12px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .stat-card .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .green { color: #2ecc71; }
        .red { color: #ff4757; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📋 Liabilities</h2>
    <p class="sub">Track who owes you and who you owe</p>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="label">📤 Owed to Me</div><div class="value green" id="statOwedToMe">0 BIF</div></div>
        <div class="stat-card"><div class="label">📥 I Owe</div><div class="value red" id="statIOwe">0 BIF</div></div>
        <div class="stat-card"><div class="label">⚖️ Net Position</div><div class="value" id="statNet">0 BIF</div></div>
    </div>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Liability</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Type</label>
                <select id="liabilityType">
                    <option value="owes_me">💰 Owed to Me (Someone owes me)</option>
                    <option value="i_owe">💸 I Owe (Debt)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Person / Entity</label>
                <input type="text" id="liabilityName" placeholder="e.g., John, Bank">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="liabilityDescription" placeholder="What is this for?">
            </div>
            <div class="form-group">
                <label>Amount (BIF)</label>
                <input type="number" id="liabilityAmount" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="liabilityDueDate">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="liabilityStatus">
                    <option value="Pending">Pending</option>
                    <option value="Paid">Paid</option>
                    <option value="Overdue">Overdue</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Notes</label>
                <input type="text" id="liabilityNotes" placeholder="Additional notes">
            </div>
        </div>
        <button class="btn" onclick="addLiability()">➕ Add Liability</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Liabilities</h3>
        <table>
            <thead>
                <tr><th>Type</th><th>Name</th><th>Description</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="liabilitiesList">
                <tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No liabilities recorded</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    document.getElementById('liabilityDueDate').value = new Date().toISOString().split('T')[0];
    loadLiabilities();
    loadSummary();
    
    function loadLiabilities() {
        fetch('/api/liabilities')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('liabilitiesList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No liabilities recorded</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(l => {
                    const typeLabel = l.type === 'owes_me' ? '💰 Owed to Me' : '💸 I Owe';
                    const typeClass = l.type === 'owes_me' ? 'owes_me' : 'i_owe';
                    const statusClass = l.status ? l.status.toLowerCase() : 'pending';
                    const amountColor = l.type === 'owes_me' ? '#2ecc71' : '#ff4757';
                    return `
                        <tr>
                            <td><span class="badge ${typeClass}">${typeLabel}</span></td>
                            <td><strong>${l.name}</strong></td>
                            <td>${l.description || '-'}</td>
                            <td style="color:${amountColor}">${Number(l.amount).toLocaleString()} FCFA</td>
                            <td>${l.due_date || '-'}</td>
                            <td><span class="badge ${statusClass}">${l.status || 'Pending'}</span></td>
                            <td>
                                <div class="action-buttons">
                                    ${l.status !== 'Paid' ? `<button class="btn-success" onclick="markPaid(${l.id})">✅ Paid</button>` : ''}
                                    <button class="btn-danger" onclick="deleteLiability(${l.id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
    }
    
    function loadSummary() {
        fetch('/api/liabilities/summary')
            .then(res => res.json())
            .then(data => {
                document.getElementById('statOwedToMe').textContent = Number(data.total_owed_to_me).toLocaleString() + ' FCFA';
                document.getElementById('statIOwe').textContent = Number(data.total_i_owe).toLocaleString() + ' FCFA';
                const net = data.net_position;
                const el = document.getElementById('statNet');
                el.textContent = (net > 0 ? '+' : '') + Number(net).toLocaleString() + ' FCFA';
                el.className = 'value ' + (net > 0 ? 'green' : net < 0 ? 'red' : '');
            });
    }
    
    function addLiability() {
        const type = document.getElementById('liabilityType').value;
        const name = document.getElementById('liabilityName').value;
        const description = document.getElementById('liabilityDescription').value;
        const amount = document.getElementById('liabilityAmount').value;
        const due_date = document.getElementById('liabilityDueDate').value;
        const status = document.getElementById('liabilityStatus').value;
        const notes = document.getElementById('liabilityNotes').value;
        if (!name || !amount || amount <= 0) { alert('Please enter name and valid amount'); return; }
        fetch('/api/liabilities', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, name, description, amount: parseFloat(amount), due_date, status, notes })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('liabilityName').value = '';
            document.getElementById('liabilityDescription').value = '';
            document.getElementById('liabilityAmount').value = '';
            document.getElementById('liabilityNotes').value = '';
            loadLiabilities();
            loadSummary();
        });
    }
    
    function markPaid(id) {
        if (!confirm('Mark this as paid?')) return;
        fetch(`/api/liabilities/${id}/paid`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert('✅ Marked as paid successfully!');
                loadLiabilities();
                loadSummary();
            }
        })
        .catch(err => {
            alert('❌ Error marking as paid');
            console.error(err);
        });
    }
    
    function deleteLiability(id) {
        if (!confirm('Delete this liability permanently?')) return;
        fetch('/api/liabilities', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => {
            loadLiabilities();
            loadSummary();
        });
    }
</script>
</body>
</html>
