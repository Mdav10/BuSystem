<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Liability Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #7a8ba3; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-success:hover { background: #27ae60; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #ff6b81; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #e67e22; }
        .btn-info { background: #3498db; color: #fff; }
        .btn-info:hover { background: #2980b9; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 12px; text-align: left; color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a2332; font-size: 14px; }
        tr:hover { background: #0f1a2b; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-card { background: #111a2b; padding: 15px; border-radius: 12px; border: 1px solid #1a2a3f; }
        .stat-card .label { font-size: 11px; color: #7a8ba3; text-transform: uppercase; }
        .stat-card .value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .stat-card .value.green { color: #2ecc71; }
        .stat-card .value.red { color: #ff4757; }
        .stat-card .value.blue { color: #3498db; }
        .stat-card .value.orange { color: #f39c12; }
        .stat-card .value.purple { color: #9b59b6; }
        h2 { color: #00d4ff; margin: 20px 0; }
        .badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 12px; }
        .badge.pending { background: #3a3a1a; color: #f39c12; }
        .badge.paid { background: #1a3a2a; color: #2ecc71; }
        .badge.overdue { background: #3a1a1a; color: #ff4757; }
        .badge.owes_me { background: #1a2a3f; color: #3498db; }
        .badge.i_owe { background: #3a1a1a; color: #ff4757; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .action-buttons .btn { padding: 4px 12px; font-size: 12px; }
        .positive { color: #2ecc71; }
        .negative { color: #ff4757; }
        .neutral { color: #f39c12; }
        .section-title { margin-top: 30px; padding-top: 20px; border-top: 1px solid #1a2332; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📋 Liability Manager</h2>
    
    <!-- Summary Stats -->
    <div class="stats" id="summaryStats">
        <div class="stat-card"><div class="label">💰 Cash</div><div class="value blue" id="statCash">0 FCFA</div></div>
        <div class="stat-card"><div class="label">🏦 Assets</div><div class="value green" id="statAssets">0 FCFA</div></div>
        <div class="stat-card"><div class="label">📤 Owed to Me</div><div class="value green" id="statOwedToMe">0 FCFA</div></div>
        <div class="stat-card"><div class="label">📥 I Owe</div><div class="value red" id="statIOwe">0 FCFA</div></div>
        <div class="stat-card"><div class="label">⚖️ Net Position</div><div class="value" id="statNet">0 FCFA</div></div>
        <div class="stat-card"><div class="label">📊 Total Equity</div><div class="value purple" id="statEquity">0 FCFA</div></div>
    </div>
    
    <!-- Add Liability Form -->
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 15px;">Add Liability</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Type</label>
                <select id="liabilityType">
                    <option value="owes_me">💰 Owed to Me (Someone owes me)</option>
                    <option value="i_owe">💸 I Owe (Debt)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Person / Entity Name</label>
                <input type="text" id="liabilityName" placeholder="e.g., John, Bank, Supplier">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="liabilityDescription" placeholder="What is this for?">
            </div>
            <div class="form-group">
                <label>Amount (FCFA)</label>
                <input type="number" id="liabilityAmount" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="liabilityDueDate">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="liabilityStatus">
                    <option value="Pending">Pending</option>
                    <option value="Paid">Paid</option>
                    <option value="Overdue">Overdue</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Notes</label>
                <input type="text" id="liabilityNotes" placeholder="Additional notes">
            </div>
        </div>
        <button class="btn" onclick="addLiability()">➕ Add Liability</button>
    </div>
    
    <!-- Liabilities Table -->
    <div class="table-wrap section-title">
        <h3 style="color: #fff;">📋 All Liabilities</h3>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="liabilitiesList">
                <tr><td colspan="7" style="text-align:center; color:#4a5a6f;">No liabilities recorded.</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    document.getElementById('liabilityDueDate').value = new Date().toISOString().split('T')[0];
    loadLiabilities();
    loadSummary();
    
    function loadLiabilities() {
        fetch('/api/liabilities')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('liabilitiesList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#4a5a6f;">No liabilities recorded.</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(l => {
                    const typeLabel = l.type === 'owes_me' ? '💰 Owed to Me' : '💸 I Owe';
                    const typeClass = l.type === 'owes_me' ? 'owes_me' : 'i_owe';
                    const amountClass = l.type === 'owes_me' ? 'positive' : 'negative';
                    return `
                        <tr>
                            <td><span class="badge ${typeClass}">${typeLabel}</span></td>
                            <td><strong>${l.name}</strong></td>
                            <td>${l.description || '-'}</td>
                            <td class="${amountClass}">${l.type === 'owes_me' ? '+' : '-'} ${Number(l.amount).toLocaleString()} FCFA</td>
                            <td>${l.due_date || '-'}</td>
                            <td><span class="badge ${l.status.toLowerCase()}">${l.status}</span></td>
                            <td>
                                <div class="action-buttons">
                                    ${l.status !== 'Paid' ? `<button class="btn btn-success" onclick="markPaid(${l.id})">✅ Paid</button>` : ''}
                                    <button class="btn btn-danger" onclick="deleteLiability(${l.id})">🗑️ Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
    }
    
    function loadSummary() {
        fetch('/api/liabilities/summary')
            .then(res => res.json())
            .then(data => {
                document.getElementById('statCash').textContent = Number(data.total_cash).toLocaleString() + ' FCFA';
                document.getElementById('statAssets').textContent = Number(data.total_assets).toLocaleString() + ' FCFA';
                document.getElementById('statOwedToMe').textContent = Number(data.total_owed_to_me).toLocaleString() + ' FCFA';
                document.getElementById('statIOwe').textContent = Number(data.total_i_owe).toLocaleString() + ' FCFA';
                
                const netEl = document.getElementById('statNet');
                const net = data.net_position;
                netEl.textContent = (net > 0 ? '+' : '') + Number(net).toLocaleString() + ' FCFA';
                netEl.className = 'value ' + (net > 0 ? 'green' : net < 0 ? 'red' : 'orange');
                
                const equityEl = document.getElementById('statEquity');
                equityEl.textContent = Number(data.total_equity).toLocaleString() + ' FCFA';
                equityEl.className = 'value ' + (data.total_equity > 0 ? 'green' : 'red');
            });
    }
    
    function addLiability() {
        const type = document.getElementById('liabilityType').value;
        const name = document.getElementById('liabilityName').value;
        const description = document.getElementById('liabilityDescription').value;
        const amount = document.getElementById('liabilityAmount').value;
        const due_date = document.getElementById('liabilityDueDate').value;
        const status = document.getElementById('liabilityStatus').value;
        const notes = document.getElementById('liabilityNotes').value;
        
        if (!name || !amount || amount <= 0) {
            alert('Please enter name and valid amount');
            return;
        }
        
        fetch('/api/liabilities', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, name, description, amount: parseFloat(amount), due_date, status, notes })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('liabilityName').value = '';
            document.getElementById('liabilityDescription').value = '';
            document.getElementById('liabilityAmount').value = '';
            document.getElementById('liabilityNotes').value = '';
            loadLiabilities();
            loadSummary();
        });
    }
    
    function markPaid(id) {
        if (!confirm('Mark this as paid?')) return;
        fetch(`/api/liabilities/${id}/paid`, { method: 'POST' })
            .then(() => {
                loadLiabilities();
                loadSummary();
            });
    }
    
    function deleteLiability(id) {
        if (!confirm('Delete this liability permanently?')) return;
        fetch(`/api/liabilities/${id}`, { method: 'DELETE' })
            .then(() => {
                loadLiabilities();
                loadSummary();
            });
    }
</script>
</body>
</html>
