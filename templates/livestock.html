<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Livestock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-success { background: #2ecc71; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-warning { background: #f39c12; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.sold { background: #1a2a3f; color: #3498db; }
        .badge.dead { background: #3a1a1a; color: #ff4757; }
        .badge.ready { background: #3a3a1a; color: #f39c12; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .profit-positive { color: #2ecc71; }
        .profit-negative { color: #ff4757; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>🐄 Livestock</h2>
    <p class="sub">Track your animals</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Animal</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Tag / ID</label>
                <input type="text" id="lsTag" placeholder="e.g., T001">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="lsType">
                    <option value="Turkey">Idendo</option>
                    <option value="Cow">Cow</option>
                    <option value="Goat">Goat</option>
                    <option value="Chicken">Chicken</option>
                    <option value="Duck">Duck</option>
                    <option value="Sheep">Sheep</option>
                    <option value="Pig">Pig</option>
                </select>
            </div>
            <div class="form-group">
                <label>Breed</label>
                <input type="text" id="lsBreed" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Purchase Price (BIF)</label>
                <input type="number" id="lsPrice" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Expected Sell Price (BIF)</label>
                <input type="number" id="lsSellPrice" placeholder="Expected sell price" step="0.01">
            </div>
            <div class="form-group">
                <label>Expected Sell Date</label>
                <input type="date" id="lsSellDate">
            </div>
        </div>
        <button class="btn" onclick="addLivestock()">➕ Add Animal</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Livestock</h3>
        <table>
            <thead>
                <tr><th>Tag</th><th>Type</th><th>Breed</th><th>Purchase Price</th><th>Status</th><th>Profit</th><th>Expected Sell</th><th>Actions</th></tr>
            </thead>
            <tbody id="livestockList">
                <tr><td colspan="8" style="text-align:center; color:#555; padding:20px;">No animals yet</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    document.getElementById('lsSellDate').value = new Date().toISOString().split('T')[0];
    loadLivestock();
    
    function loadLivestock() {
        fetch('/api/livestock')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('livestockList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#555; padding:20px;">No animals yet</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(l => {
                    const profitClass = l.profit > 0 ? 'profit-positive' : l.profit < 0 ? 'profit-negative' : '';
                    const canSell = l.status === 'Active' || l.status === 'Ready';
                    return `
                        <tr>
                            <td><strong>${l.tag}</strong></td>
                            <td>${l.type}</td>
                            <td>${l.breed || '-'}</td>
                            <td>${Number(l.purchase_price).toLocaleString()} FCFA</td>
                            <td><span class="badge ${l.status.toLowerCase()}">${l.status}</span></td>
                            <td class="${profitClass}">${l.profit ? Number(l.profit).toLocaleString() + ' FCFA' : '-'}</td>
                            <td>${l.expected_sell_date || '-'}</td>
                            <td>
                                <div class="action-buttons">
                                    ${canSell ? `<button class="btn-success" onclick="sellLivestock(${l.id})">Sell</button>` : ''}
                                    <button class="btn-danger" onclick="deleteLivestock(${l.id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
    }
    
    function addLivestock() {
        const tag = document.getElementById('lsTag').value;
        const type = document.getElementById('lsType').value;
        const breed = document.getElementById('lsBreed').value;
        const purchase_price = document.getElementById('lsPrice').value;
        const expected_sell_price = document.getElementById('lsSellPrice').value;
        const expected_sell_date = document.getElementById('lsSellDate').value;
        if (!tag || !purchase_price || purchase_price <= 0) { alert('Please enter tag and valid purchase price'); return; }
        fetch('/api/livestock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag, type, breed, purchase_price: parseFloat(purchase_price), expected_sell_price: parseFloat(expected_sell_price) || 0, expected_sell_date })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('lsTag').value = '';
            document.getElementById('lsPrice').value = '';
            document.getElementById('lsSellPrice').value = '';
            loadLivestock();
        });
    }
    
    function sellLivestock(id) {
        const price = prompt('💰 Enter sell price (FCFA):');
        if (price === null) return;
        if (!price || parseFloat(price) <= 0) { alert('Please enter a valid sell price'); return; }
        if (!confirm(`Sell this animal for ${parseFloat(price).toLocaleString()} FCFA?`)) return;
        
        fetch(`/api/livestock/${id}/sell`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sell_price: parseFloat(price) })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(`✅ Sold!\n\nSell Price: ${data.sell_price.toLocaleString()} FCFA\nProfit: ${data.profit.toLocaleString()} FCFA`);
                loadLivestock();
            }
        })
        .catch(err => {
            alert('❌ Error selling animal');
            console.error(err);
        });
    }
    
    function deleteLivestock(id) {
        if (!confirm('Delete this animal permanently?')) return;
        fetch('/api/livestock', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadLivestock());
    }
</script>
</body>
</html>
