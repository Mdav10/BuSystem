<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Livestock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #7a8ba3; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #ff6b81; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 12px; text-align: left; color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a2332; font-size: 14px; }
        tr:hover { background: #0f1a2b; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 12px; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.sold { background: #1a2a3f; color: #3498db; }
        .badge.dead { background: #3a1a1a; color: #ff4757; }
        .badge.ready { background: #3a3a1a; color: #f39c12; }
        h2 { color: #00d4ff; margin: 20px 0; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .action-buttons .btn { padding: 4px 12px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>🐄 Livestock Manager</h2>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 15px;">Add Animal</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Tag / ID</label>
                <input type="text" id="lsTag" placeholder="e.g., T001, G005">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="lsType">
                    <option value="Turkey">Turkey</option>
                    <option value="Cow">Cow</option>
                    <option value="Goat">Goat</option>
                    <option value="Chicken">Chicken</option>
                    <option value="Duck">Duck</option>
                    <option value="Sheep">Sheep</option>
                    <option value="Pig">Pig</option>
                </select>
            </div>
            <div class="form-group">
                <label>Breed</label>
                <input type="text" id="lsBreed" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Purchase Price (FCFA)</label>
                <input type="number" id="lsPrice" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Expected Sell Price (FCFA)</label>
                <input type="number" id="lsSellPrice" placeholder="Expected sell price" step="0.01">
            </div>
            <div class="form-group">
                <label>Expected Sell Date</label>
                <input type="date" id="lsSellDate">
            </div>
        </div>
        <button class="btn" onclick="addLivestock()">➕ Add Animal</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px;">Your Livestock</h3>
        <table>
            <thead>
                <tr>
                    <th>Tag</th>
                    <th>Type</th>
                    <th>Breed</th>
                    <th>Purchase Price</th>
                    <th>Status</th>
                    <th>Expected Sell</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="livestockList">
                <tr><td colspan="7" style="text-align:center; color:#4a5a6f;">No animals yet.</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    document.getElementById('lsSellDate').value = new Date().toISOString().split('T')[0];
    loadLivestock();
    
    function loadLivestock() {
        fetch('/api/livestock')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('livestockList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#4a5a6f;">No animals yet.</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(l => `
                    <tr>
                        <td><strong>${l.tag}</strong></td>
                        <td>${l.type}</td>
                        <td>${l.breed || '-'}</td>
                        <td>${Number(l.purchase_price).toLocaleString()} FCFA</td>
                        <td><span class="badge ${l.status.toLowerCase()}">${l.status}</span></td>
                        <td>${l.expected_sell_date || '-'}</td>
                        <td>
                            <button class="btn btn-danger" style="padding:4px 12px; font-size:12px;" onclick="deleteLivestock(${l.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            });
    }
    
    function addLivestock() {
        const tag = document.getElementById('lsTag').value;
        const type = document.getElementById('lsType').value;
        const breed = document.getElementById('lsBreed').value;
        const purchase_price = document.getElementById('lsPrice').value;
        const expected_sell_price = document.getElementById('lsSellPrice').value;
        const expected_sell_date = document.getElementById('lsSellDate').value;
        
        if (!tag || !purchase_price || purchase_price <= 0) {
            alert('Please enter tag and valid purchase price');
            return;
        }
        
        fetch('/api/livestock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag, type, breed, purchase_price: parseFloat(purchase_price), expected_sell_price: parseFloat(expected_sell_price) || 0, expected_sell_date })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('lsTag').value = '';
            document.getElementById('lsPrice').value = '';
            document.getElementById('lsSellPrice').value = '';
            loadLivestock();
        });
    }
    
    function deleteLivestock(id) {
        if (!confirm('Delete this animal permanently?')) return;
        fetch(`/api/livestock/${id}`, { method: 'DELETE' })
            .then(() => loadLivestock());
    }
</script>
</body>
</html>
