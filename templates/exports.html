<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Exports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .content { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin: 5px; }
        .btn-pdf { background: #ff4757; color: #fff; }
        .btn-excel { background: #2ecc71; color: #fff; }
        .btn-json { background: #3498db; color: #fff; }
        .btn-print { background: #f39c12; color: #fff; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .export-card { background: #0a0e17; padding: 14px 16px; border-radius: 10px; margin: 8px 0; border: 1px solid #1a1a1a; }
        .export-card h4 { color: #fff; margin-bottom: 6px; }
        .export-card p { color: #888; font-size: 13px; }
        @media (max-width: 600px) { .btn-group { flex-direction: column; } .btn { width: 100%; text-align: center; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📤 Exports</h2>
    <p class="sub">Export your financial data</p>
    
    <div class="content">
        <div class="export-card">
            <h4>📄 PDF Reports</h4>
            <p>Download professional PDF reports</p>
            <div class="btn-group">
                <a href="/api/reports/export/transactions/pdf" class="btn btn-pdf">📄 PDF Report</a>
            </div>
        </div>
        
        <div class="export-card">
            <h4>📊 Excel Reports</h4>
            <p>Export to Excel for further analysis</p>
            <div class="btn-group">
                <a href="/api/reports/export/transactions/excel" class="btn btn-excel">📊 Excel Export</a>
            </div>
        </div>
        
        <div class="export-card">
            <h4>🖨️ Print</h4>
            <p>Print your dashboard or reports</p>
            <div class="btn-group">
                <button class="btn btn-print" onclick="window.print()">🖨️ Print Page</button>
            </div>
        </div>
        
        <div class="export-card">
            
            <div class="btn-group">
                <a href="/api/reports/income_statement" class="btn btn-json" target="_blank"></a>
                <a href="/api/reports/balance_sheet" class="btn btn-json" target="_blank"></a>
                <a href="/api/transactions" class="btn btn-json" target="_blank"></a>
                <a href="/api/investments" class="btn btn-json" target="_blank"></a>
            </div>
        </div>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>
</body>
</html>
