<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Goals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0a0e17; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-success { background: #2ecc71; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-warning { background: #f39c12; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 10px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.completed { background: #1a2a3f; color: #3498db; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .progress-bar { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); border-radius: 3px; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; padding: 30px; border-radius: 16px; max-width: 400px; width: 90%; border: 1px solid #222; }
        .modal-content h3 { color: #00d4ff; margin-bottom: 15px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .close { float: right; color: #888; font-size: 28px; cursor: pointer; }
        .close:hover { color: #fff; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>🎯 Goals</h2>
    <p class="sub">Set and track your financial goals</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Set a Goal</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Goal Name</label>
                <input type="text" id="goalName" placeholder="e.g., Buy Shop">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="goalCategory">
                    <option value="Property">Property</option>
                    <option value="Business">Business</option>
                    <option value="Livestock">Livestock</option>
                    <option value="Savings">Savings</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Target Amount (BIF)</label>
                <input type="number" id="goalTarget" placeholder="Enter target amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Current Amount (BIF)</label>
                <input type="number" id="goalCurrent" placeholder="Current saved" step="0.01" value="0">
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" id="goalDeadline">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="goalPriority">
                    <option value="1">High</option>
                    <option value="2">Medium</option>
                    <option value="3">Low</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="addGoal()">🎯 Set Goal</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Your Goals</h3>
        <table>
            <thead>
                <tr><th>Name</th><th>Category</th><th>Target</th><th>Current</th><th>Progress</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="goalsList">
                <tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No goals set</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<!-- Add Amount Modal -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAddModal()">&times;</span>
        <h3>💰 Add to Goal</h3>
        <div class="form-group">
            <label>Goal</label>
            <input type="text" id="addGoalName" disabled style="color:#888;">
        </div>
        <div class="form-group">
            <label>Current Amount</label>
            <input type="text" id="addCurrentAmount" disabled style="color:#888;">
        </div>
        <div class="form-group">
            <label>Amount to Add (BIF)</label>
            <input type="number" id="addAmount" placeholder="Enter amount to add" step="0.01">
        </div>
        <div class="modal-actions">
            <button class="btn btn-success" onclick="addToGoal()">✅ Add Amount</button>
            <button class="btn" onclick="closeAddModal()" style="background:#222; color:#fff;">Cancel</button>
        </div>
    </div>
</div>

<script>
    let currentGoalId = null;
    document.getElementById('goalDeadline').value = new Date().toISOString().split('T')[0];
    loadGoals();
    
    function loadGoals() {
        fetch('/api/goals')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('goalsList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#555; padding:20px;">No goals set</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(g => `
                    <tr>
                        <td><strong>${g.name}</strong></td>
                        <td>${g.category || '-'}</td>
                        <td>${Number(g.target_amount).toLocaleString()} BIF</td>
                        <td>${Number(g.current_amount).toLocaleString()} BIF</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="progress-bar" style="flex:1;"><div class="progress-fill" style="width:${g.progress}%;"></div></div>
                                <span>${g.progress.toFixed(0)}%</span>
                            </div>
                        </td>
                        <td><span class="badge ${g.status.toLowerCase()}">${g.status}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-success" onclick="openAddModal(${g.id}, '${g.name}', ${g.current_amount})">💰 Add</button>
                                <button class="btn-danger" onclick="deleteGoal(${g.id})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            });
    }
    
    function openAddModal(id, name, current) {
        currentGoalId = id;
        document.getElementById('addGoalName').value = name;
        document.getElementById('addCurrentAmount').value = current.toLocaleString() + ' BIF';
        document.getElementById('addAmount').value = '';
        document.getElementById('addModal').style.display = 'flex';
    }
    
    function closeAddModal() {
        document.getElementById('addModal').style.display = 'none';
        currentGoalId = null;
    }
    
    function addToGoal() {
        const amount = document.getElementById('addAmount').value;
        if (!amount || parseFloat(amount) <= 0) {
            alert('Please enter a valid amount to add');
            return;
        }
        
        fetch(`/api/goals/${currentGoalId}/add`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: parseFloat(amount) })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(`✅ Added ${parseFloat(amount).toLocaleString()} BIF!\n\nNew Current: ${data.current_amount.toLocaleString()} BIF\nProgress: ${data.progress.toFixed(0)}%\nRemaining: ${data.remaining.toLocaleString()} BIF`);
                closeAddModal();
                loadGoals();
            }
        })
        .catch(err => {
            alert('❌ Error adding amount');
            console.error(err);
        });
    }
    
    function addGoal() {
        const name = document.getElementById('goalName').value;
        const category = document.getElementById('goalCategory').value;
        const target_amount = document.getElementById('goalTarget').value;
        const current_amount = document.getElementById('goalCurrent').value || 0;
        const deadline = document.getElementById('goalDeadline').value;
        const priority = document.getElementById('goalPriority').value;
        if (!name || !target_amount || target_amount <= 0) { alert('Please enter goal name and valid target amount'); return; }
        fetch('/api/goals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, category, target_amount: parseFloat(target_amount), current_amount: parseFloat(current_amount), deadline, priority: parseInt(priority) })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('goalName').value = '';
            document.getElementById('goalTarget').value = '';
            document.getElementById('goalCurrent').value = '';
            loadGoals();
        });
    }
    
    function deleteGoal(id) {
        if (!confirm('Delete this goal?')) return;
        fetch('/api/goals', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadGoals());
    }
</script>
</body>
</html>
