<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Goals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; animation: fadeInDown 0.5s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .back {
            color: #7a8ba3;
            text-decoration: none;
            padding: 8px 16px;
            background: #1a2a3f;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .back:active { transform: scale(0.95); }
        .back::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        .back:active::before { width: 300px; height: 300px; }
        .content { margin-top: 30px; padding: 30px; background: #111a2b; border-radius: 16px; border: 1px solid #1a2a3f; min-height: 300px; animation: fadeInUp 0.6s ease-out 0.1s both; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; border-top: 1px solid #1a2332; padding-top: 15px; font-size: 12px; animation: fadeInUp 0.6s ease-out 0.3s both; }
        h2 { color: #00d4ff; margin-bottom: 15px; }
        .sub { color: #7a8ba3; }
        .api-endpoint {
            background: #0f1a2b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: monospace;
            color: #00d4ff;
            border: 1px solid #1a2a3f;
        }
        .btn {
            background: #00d4ff;
            color: #0a0e17;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        .btn:active::before { width: 400px; height: 400px; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            background: #1a3a2a;
            color: #2ecc71;
        }
        .data-list {
            margin-top: 15px;
        }
        .data-item {
            background: #0f1a2b;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #1a2332;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .data-item .key { color: #7a8ba3; font-size: 12px; }
        .data-item .value { color: #00d4ff; font-weight: bold; }
        .empty-state { color: #4a5a6f; text-align: center; padding: 30px 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #7a8ba3; font-size: 13px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #0f1a2b;
            border: 1px solid #1a2a3f;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    <div class="content">
        <h2>📋 Goals</h2>
        <p class="sub">Manage your goals here.</p>
        
        <div class="api-endpoint">
            📡 API: GET /api/goals
        </div>
        
        <div id="dataContainer">
            <div class="empty-state">Loading data...</div>
        </div>
        
        <button class="btn" onclick="loadData()" style="margin-top:15px;">🔄 Refresh</button>
    </div>
    <div class="footer">Every Franc Must Have a Job</div>
</div>
<script>
    function loadData() {
        const container = document.getElementById('dataContainer');
        container.innerHTML = '<div class="empty-state">Loading...</div>';
        fetch('/api/goals')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-state">No data found. Add some data to get started!</div>';
                    return;
                }
                container.innerHTML = data.map(item => {
                    const fields = Object.keys(item);
                    return '<div class="data-item">' + 
                        fields.map(f => '<span><span class="key">' + f + ':</span> <span class="value">' + (item[f] || '-') + '</span></span>').join('') +
                        '</div>';
                }).join('');
            })
            .catch(err => {
                container.innerHTML = '<div class="empty-state">Error loading data: ' + err.message + '</div>';
            });
    }
    loadData();
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.querySelector('.footer').textContent = 'BuSystem • Installed as App';
    }
</script>
</body>
</html>
