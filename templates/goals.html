<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Goals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #7a8ba3; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 12px; text-align: left; color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a2332; font-size: 14px; }
        tr:hover { background: #0f1a2b; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .progress-bar { width: 100%; height: 8px; background: #1a2332; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); border-radius: 4px; transition: width 0.8s; }
        .badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 12px; }
        .badge.active { background: #1a3a2a; color: #2ecc71; }
        .badge.completed { background: #1a2a3f; color: #3498db; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2 style="color:#00d4ff; margin: 20px 0;">🎯 Goal Planner</h2>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 15px;">Set a Goal</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Goal Name</label>
                <input type="text" id="goalName" placeholder="e.g., Buy Shop, Build House">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="goalCategory">
                    <option value="Property">Property</option>
                    <option value="Business">Business</option>
                    <option value="Livestock">Livestock</option>
                    <option value="Savings">Savings</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Target Amount (FCFA)</label>
                <input type="number" id="goalTarget" placeholder="Enter target amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Current Amount (FCFA)</label>
                <input type="number" id="goalCurrent" placeholder="Current saved" step="0.01">
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" id="goalDeadline">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="goalPriority">
                    <option value="1">High</option>
                    <option value="2">Medium</option>
                    <option value="3">Low</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="addGoal()">🎯 Set Goal</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px;">Your Goals</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Target</th>
                    <th>Current</th>
                    <th>Progress</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="goalsList">
                <tr><td colspan="6" style="text-align:center; color:#4a5a6f;">No goals set yet.</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    document.getElementById('goalDeadline').value = new Date().toISOString().split('T')[0];
    loadGoals();
    
    function loadGoals() {
        fetch('/api/goals')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('goalsList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#4a5a6f;">No goals set yet.</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(g => `
                    <tr>
                        <td><strong>${g.name}</strong></td>
                        <td>${g.category || '-'}</td>
                        <td>${Number(g.target_amount).toLocaleString()} FCFA</td>
                        <td>${Number(g.current_amount).toLocaleString()} FCFA</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="progress-bar" style="flex:1;"><div class="progress-fill" style="width:${g.progress}%;"></div></div>
                                <span>${g.progress.toFixed(0)}%</span>
                            </div>
                        </td>
                        <td><span class="badge ${g.status.toLowerCase()}">${g.status}</span></td>
                    </tr>
                `).join('');
            });
    }
    
    function addGoal() {
        const name = document.getElementById('goalName').value;
        const category = document.getElementById('goalCategory').value;
        const target_amount = document.getElementById('goalTarget').value;
        const current_amount = document.getElementById('goalCurrent').value || 0;
        const deadline = document.getElementById('goalDeadline').value;
        const priority = document.getElementById('goalPriority').value;
        
        if (!name || !target_amount || target_amount <= 0) {
            alert('Please enter goal name and valid target amount');
            return;
        }
        
        fetch('/api/goals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                name, category, 
                target_amount: parseFloat(target_amount),
                current_amount: parseFloat(current_amount),
                deadline, priority: parseInt(priority)
            })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('goalName').value = '';
            document.getElementById('goalTarget').value = '';
            document.getElementById('goalCurrent').value = '';
            loadGoals();
        });
    }
</script>
</body>
</html>
