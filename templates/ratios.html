<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Ratios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        @media (max-width: 600px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
        h2 { color: #00d4ff; margin: 20px 0; }
        .ratio-card { background: #0f1a2b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #1a2332; }
        .ratio-card .label { color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        .ratio-card .value { font-size: 28px; font-weight: bold; margin-top: 8px; }
        .ratio-card .value.green { color: #2ecc71; }
        .ratio-card .value.red { color: #ff4757; }
        .ratio-card .value.orange { color: #f39c12; }
        .ratio-card .value.blue { color: #3498db; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📐 Financial Ratios</h2>
    
    <div class="card">
        <div class="grid-3" id="ratiosContainer">
            <div class="ratio-card"><div class="label">Loading...</div><div class="value">-</div></div>
        </div>
    </div>
    
    <button class="btn" onclick="loadRatios()">🔄 Refresh Ratios</button>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    loadRatios();
    
    function loadRatios() {
        fetch('/api/ratios')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('ratiosContainer');
                const items = [
                    { label: 'ROI', value: data.roi + '%', cls: data.roi > 30 ? 'green' : data.roi > 10 ? 'orange' : 'red' },
                    { label: 'Profit Margin', value: data.profit_margin + '%', cls: data.profit_margin > 20 ? 'green' : data.profit_margin > 5 ? 'orange' : 'red' },
                    { label: 'Savings Ratio', value: data.savings_ratio + '%', cls: data.savings_ratio > 20 ? 'green' : data.savings_ratio > 5 ? 'orange' : 'red' },
                    { label: 'Capital Turnover', value: data.capital_turnover.toFixed(2), cls: data.capital_turnover > 1 ? 'green' : 'orange' },
                    { label: 'Investment Success', value: data.investment_success_rate + '%', cls: data.investment_success_rate > 70 ? 'green' : data.investment_success_rate > 40 ? 'orange' : 'red' }
                ];
                container.innerHTML = items.map(item => `
                    <div class="ratio-card">
                        <div class="label">${item.label}</div>
                        <div class="value ${item.cls}">${item.value}</div>
                    </div>
                `).join('');
            });
    }
</script>
</body>
</html>
