<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Timeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e17; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .back { color: #888; text-decoration: none; padding: 8px 16px; background: #111; border-radius: 8px; }
        .content { background: #111; border-radius: 16px; padding: 20px; border: 1px solid #222; margin: 20px 0; min-height: 300px; }
        .footer { margin-top: 30px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 16px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        .btn { background: #00d4ff; color: #000; padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: #222; }
        .event { position: relative; margin-bottom: 16px; padding: 12px 16px; background: #0a0e17; border-radius: 10px; border: 1px solid #1a1a1a; }
        .event::before { content: ''; position: absolute; left: -20px; top: 14px; width: 10px; height: 10px; border-radius: 50%; background: #00d4ff; border: 2px solid #0a0e17; }
        .event .date { color: #888; font-size: 11px; }
        .event .title { font-size: 15px; font-weight: bold; margin: 4px 0; }
        .event .desc { color: #888; font-size: 13px; }
        .event .icon { font-size: 18px; margin-right: 8px; }
        .empty { color: #555; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>⏰ Timeline</h2>
    <p class="sub">All your financial activities in one place</p>
    
    <div class="content">
        <div id="timelineContainer" class="timeline">
            <div class="empty">Loading your financial timeline...</div>
        </div>
        <button class="btn" onclick="loadTimeline()">🔄 Refresh</button>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadTimeline();
    
    function loadTimeline() {
        fetch('/api/timeline')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('timelineContainer');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No events yet. Start adding transactions!</div>';
                    return;
                }
                container.innerHTML = data.map(e => `
                    <div class="event">
                        <div class="date">${e.date}</div>
                        <div class="title"><span class="icon">${e.icon}</span> ${e.title}</div>
                        <div class="desc">${e.description}</div>
                    </div>
                `).join('');
            });
    }
</script>
</body>
</html>
