<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Timeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        h2 { color: #00d4ff; margin: 20px 0; }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: #1a2332; }
        .event { position: relative; margin-bottom: 25px; padding: 15px 20px; background: #111a2b; border-radius: 12px; border: 1px solid #1a2a3f; }
        .event::before { content: ''; position: absolute; left: -24px; top: 18px; width: 12px; height: 12px; border-radius: 50%; background: #00d4ff; border: 2px solid #0a0e17; }
        .event .date { color: #7a8ba3; font-size: 12px; }
        .event .title { font-size: 16px; font-weight: bold; margin: 5px 0; }
        .event .desc { color: #7a8ba3; font-size: 14px; }
        .event .icon { font-size: 20px; margin-right: 10px; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .empty { text-align: center; color: #4a5a6f; padding: 60px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>⏰ Timeline</h2>
    
    <div id="timelineContainer" class="timeline">
        <div class="empty">Loading your financial timeline...</div>
    </div>
    
    <button class="btn" onclick="loadTimeline()" style="margin-top:10px;">🔄 Refresh</button>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    loadTimeline();
    
    function loadTimeline() {
        fetch('/api/timeline')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('timelineContainer');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No events yet. Start adding transactions!</div>';
                    return;
                }
                container.innerHTML = data.map(e => `
                    <div class="event">
                        <div class="date">${e.date}</div>
                        <div class="title"><span class="icon">${e.icon}</span> ${e.title}</div>
                        <div class="desc">${e.description}</div>
                    </div>
                `).join('');
            });
    }
</script>
</body>
</html>
