<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Clients</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: 700; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 20px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #7a8ba3; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.95); }
        .btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; pointer-events: none; }
        .btn:active::before { width: 400px; height: 400px; }
        .btn-danger { background: #ff4757; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-success { background: #2ecc71; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-warning { background: #f39c12; color: #fff; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 10px; text-align: left; color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2332; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.trusted { background: #1a3a2a; color: #2ecc71; }
        .badge.normal { background: #1a2a3f; color: #7a8ba3; }
        .badge.high { background: #3a3a1a; color: #f39c12; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 12px; border-top: 1px solid #1a2332; padding-top: 15px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #7a8ba3; font-size: 13px; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-buttons button { padding: 3px 10px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .trust-score { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .trust-score.high { background: #1a3a2a; color: #2ecc71; }
        .trust-score.medium { background: #3a3a1a; color: #f39c12; }
        .trust-score.low { background: #3a1a1a; color: #ff4757; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><img src="/static/icons/icon-192.png" alt="BuSystem" class="logo-icon"> BuSystem</div>
        <a href="/admin/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>👥 Clients</h2>
    <p class="sub">Manage your clients</p>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Client</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Client Name</label>
                <input type="text" id="clientName" placeholder="Enter client name">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="clientPhone" placeholder="Phone number">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="clientEmail" placeholder="Email address">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="clientLocation" placeholder="Location">
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Notes</label>
                <input type="text" id="clientNotes" placeholder="Additional notes">
            </div>
        </div>
        <button class="btn" onclick="addClient()">➕ Add Client</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px;">Your Clients</h3>
        <table>
            <thead>
                <tr><th>Name</th><th>Phone</th><th>Location</th><th>Purchases</th><th>Total Spent</th><th>Trust Score</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="clientsList">
                <tr><td colspan="8" style="text-align:center; color:#4a5a6f; padding:20px;">No clients yet</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadClients();
    
    function loadClients() {
        fetch('/api/clients')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('clientsList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#4a5a6f; padding:20px;">No clients yet</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(c => {
                    const trustClass = c.trust_score >= 70 ? 'high' : c.trust_score >= 40 ? 'medium' : 'low';
                    const statusClass = c.is_trusted ? 'trusted' : 'normal';
                    const statusText = c.is_trusted ? '⭐ Trusted' : 'Normal';
                    return `<tr>
                        <td><strong>${c.name}</strong></td>
                        <td>${c.phone || '-'}</td>
                        <td>${c.location || '-'}</td>
                        <td>${c.purchase_count}</td>
                        <td>${Number(c.total_purchases).toLocaleString()} FCFA</td>
                        <td><span class="trust-score ${trustClass}">${c.trust_score}%</span></td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="action-buttons">
                                ${!c.is_trusted && c.purchase_count >= 5 ? `<button class="btn-success" onclick="markTrusted(${c.id})">⭐ Trust</button>` : ''}
                                <button class="btn-danger" onclick="deleteClient(${c.id})">Delete</button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            });
    }
    
    function addClient() {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const email = document.getElementById('clientEmail').value;
        const location = document.getElementById('clientLocation').value;
        const notes = document.getElementById('clientNotes').value;
        
        if (!name) {
            alert('Please enter client name');
            return;
        }
        
        fetch('/api/clients', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, email, location, notes })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('clientName').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientLocation').value = '';
            document.getElementById('clientNotes').value = '';
            loadClients();
        });
    }
    
    function markTrusted(id) {
        if (!confirm('Mark this client as TRUSTED?')) return;
        fetch(`/api/clients/${id}/trust`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_trusted: true, reason: 'Manual trust by admin' })
        })
        .then(() => loadClients());
    }
    
    function deleteClient(id) {
        if (!confirm('Delete this client?')) return;
        fetch('/api/clients', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(() => loadClients());
    }
</script>
</body>
</html>
