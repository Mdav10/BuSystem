<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a2a3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e6ed;
        }
        .login-box {
            background: #111a2b;
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid #1a2a3f;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .logo { font-size: 36px; font-weight: bold; color: #00d4ff; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #7a8ba3; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #7a8ba3; }
        .input-group input {
            width: 100%;
            padding: 14px;
            background: #0f1a2b;
            border: 1px solid #1a2a3f;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #0a0e17;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover { background: #00ff88; transform: scale(1.02); }
        .error { color: #ff4757; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .footer { text-align: center; margin-top: 20px; color: #4a5a6f; font-size: 12px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">💰 BuSystem</div>
    <div class="subtitle">Personal Finance Operating System</div>
    {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="POST">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">🚀 Access BuSystem</button>
    </form>
    <div class="footer">Every Franc Must Have a Job</div>
</div>
</body>
</html>
