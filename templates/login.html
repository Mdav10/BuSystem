<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230a0e17'/%3E%3Ctext x='256' y='340' font-family='Arial, sans-serif' font-size='180' font-weight='bold' text-anchor='middle' fill='%2300d4ff'%3E💰%3C/text%3E%3Ctext x='256' y='420' font-family='Arial, sans-serif' font-size='42' font-weight='bold' text-anchor='middle' fill='%2300d4ff'%3EBuSys%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a2a3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e6ed;
            -webkit-tap-highlight-color: transparent;
        }
        /* Splash Screen Animation */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e17;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 1.2s ease-in-out 0.5s forwards;
        }
        .splash-screen .logo {
            font-size: 80px;
            margin-bottom: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .splash-screen .app-name {
            font-size: 36px;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        .splash-screen .tagline {
            font-size: 14px;
            color: #4a5a6f;
        }
        .splash-screen .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1a2a3f;
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            margin-top: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        .login-box {
            background: #111a2b;
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid #1a2a3f;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.8s ease-out 1.2s both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-text { 
            font-size: 36px; 
            font-weight: bold; 
            color: #00d4ff; 
            text-align: center; 
            margin-bottom: 8px; 
        }
        .subtitle { text-align: center; color: #7a8ba3; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #7a8ba3; }
        .input-group input {
            width: 100%;
            padding: 14px;
            background: #0f1a2b;
            border: 1px solid #1a2a3f;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
            -webkit-appearance: none;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #0a0e17;
            cursor: pointer;
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-login:hover { background: #00ff88; transform: scale(1.02); }
        .btn-login:active { transform: scale(0.98); }
        .error { color: #ff4757; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .footer { text-align: center; margin-top: 20px; color: #4a5a6f; font-size: 12px; }
        .install-banner {
            display: none;
            background: #1a2a3f;
            padding: 12px 18px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #7a8ba3;
            border: 1px solid #2a3f5f;
            animation: slideUp 0.5s ease-out;
        }
        .install-banner .btn-install {
            background: #00d4ff;
            color: #0a0e17;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.3s;
        }
        .install-banner .btn-install:active {
            transform: scale(0.95);
        }
        @media (max-width: 480px) {
            .login-box { padding: 30px 20px; }
        }
    </style>
</head>
<body>
<!-- Splash Screen -->
<div class="splash-screen" id="splashScreen">
    <div class="logo">💰</div>
    <div class="app-name">BuSystem</div>
    <div class="tagline">Every Franc Must Have a Job</div>
    <div class="loading-spinner"></div>
</div>

<div class="login-box">
    <div class="logo-text">💰 BuSys</div>
    <div class="subtitle">Personal Finance Operating System</div>
    {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="POST">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">🚀 Access BuSystem</button>
    </form>
    <div id="installBanner" class="install-banner">
        📱 Install BuSys as App
        <br>
        <button class="btn-install" id="installBtn">📲 Install App</button>
    </div>
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    // Remove splash screen after animation
    setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        if (splash) {
            splash.style.display = 'none';
        }
    }, 2000);
    
    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').style.display = 'block';
    });
    
    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                document.getElementById('installBanner').style.display = 'none';
            }
            deferredPrompt = null;
        }
    });
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js')
            .then(reg => {
                console.log('✅ BuSystem SW registered:', reg);
                // Check for updates
                reg.addEventListener('updatefound', () => {
                    const newSW = reg.installing;
                    newSW.addEventListener('statechange', () => {
                        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('🔄 BuSystem: Update available');
                            if (confirm('A new version of BuSystem is available. Update now?')) {
                                newSW.postMessage('skipWaiting');
                                window.location.reload();
                            }
                        }
                    });
                });
            })
            .catch(err => console.log('⚠️ BuSystem SW registration failed:', err));
    }
    
    // Check if installed as PWA
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.getElementById('installBanner').style.display = 'none';
        document.querySelector('.footer').textContent = 'BuSystem v1.0 • Installed as App';
    }
</script>
</body>
</html>
