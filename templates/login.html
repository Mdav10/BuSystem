<!DOCTYPE html>
<html>
<head>
    <title>BuSystem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e17, #1a2a3f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .login-box {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #222;
            width: 380px;
            max-width: 90%;
        }
        .logo { font-size: 36px; font-weight: bold; color: #00d4ff; text-align: center; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 4px; color: #888; font-size: 13px; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #0a0e17;
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #00d4ff; }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }
        .btn-login:hover { background: #00ff88; }
        .error { color: #ff4757; text-align: center; margin-bottom: 16px; }
        .footer { text-align: center; margin-top: 16px; color: #555; font-size: 12px; }
        .icon { text-align: center; font-size: 60px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="icon">💰</div>
    <div class="logo">BuSys</div>
    <div class="subtitle">Personal Finance OS</div>
    {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="POST">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Access</button>
    </form>
    <div class="footer">Every Franc Must Have a Job</div>
</div>
</body>
</html>
