<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Cash Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-512.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; animation: fadeInDown 0.5s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
        .back {
            color: #7a8ba3;
            text-decoration: none;
            padding: 8px 16px;
            background: #1a2a3f;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .back:active { transform: scale(0.95); }
        .back::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        .back:active::before { width: 300px; height: 300px; }
        .form-card { background: #111a2b; border-radius: 16px; padding: 20px; border: 1px solid #1a2a3f; margin: 20px 0; animation: fadeInUp 0.6s ease-out 0.1s both; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #7a8ba3; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn {
            background: #00d4ff;
            color: #0a0e17;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        .btn:active::before { width: 400px; height: 400px; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:active { transform: scale(0.95); }
        .btn-danger::before { background: rgba(255,255,255,0.2); }
        .table-wrap { overflow-x: auto; margin-top: 20px; animation: fadeInUp 0.6s ease-out 0.2s both; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 10px; text-align: left; color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2332; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .badge.income { background: #1a3a2a; color: #2ecc71; }
        .badge.expense { background: #3a1a1a; color: #ff4757; }
        .amount-positive { color: #2ecc71; }
        .amount-negative { color: #ff4757; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; animation: fadeInUp 0.6s ease-out 0.05s both; }
        .stat-card { background: #111a2b; padding: 12px; border-radius: 10px; border: 1px solid #1a2a3f; text-align: center; }
        .stat-card .label { font-size: 10px; color: #7a8ba3; text-transform: uppercase; }
        .stat-card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .stat-card .value.green { color: #2ecc71; }
        .stat-card .value.red { color: #ff4757; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 11px; border-top: 1px solid #1a2332; padding-top: 12px; animation: fadeInUp 0.6s ease-out 0.3s both; }
        h2 { color: #00d4ff; margin-bottom: 5px; animation: fadeInDown 0.5s ease-out; }
        .sub { color: #7a8ba3; font-size: 13px; animation: fadeInDown 0.5s ease-out; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><img src="/static/icons/icon-192.png" alt="BuSystem" class="logo-icon"> BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>💰 Cash Flow</h2>
    <p class="sub">Track every Franc that enters or leaves</p>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="label">Total Income</div><div class="value green" id="totalIncome">0 FCFA</div></div>
        <div class="stat-card"><div class="label">Total Expenses</div><div class="value red" id="totalExpenses">0 FCFA</div></div>
        <div class="stat-card"><div class="label">Balance</div><div class="value" id="balance">0 FCFA</div></div>
    </div>
    
    <div class="form-card">
        <h3 style="color: #fff; margin-bottom: 12px; font-size: 16px;">Add Transaction</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Type</label>
                <select id="txType">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="txCategory">
                    <option value="Salary">Salary</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Livestock">Livestock</option>
                    <option value="Shop">Shop</option>
                    <option value="Farming">Farming</option>
                    <option value="Food">Food</option>
                    <option value="Internet">Internet</option>
                    <option value="Transport">Transport</option>
                    <option value="Family">Family</option>
                    <option value="Investment">Investment</option>
                    <option value="Emergency">Emergency</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (FCFA)</label>
                <input type="number" id="txAmount" placeholder="Enter amount" step="0.01">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="txDate">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="txDescription" placeholder="Optional description">
        </div>
        <button class="btn" onclick="addTransaction()">➕ Add Transaction</button>
    </div>
    
    <div class="table-wrap">
        <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Recent Transactions</h3>
        <table>
            <thead>
                <tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th><th>Description</th><th>Action</th></tr>
            </thead>
            <tbody id="transactionsList">
                <tr><td colspan="6" style="text-align:center; color:#4a5a6f; padding:20px;">No transactions yet. Add one above!</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
    loadTransactions();
    
    function loadTransactions() {
        fetch('/api/transactions')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('transactionsList');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#4a5a6f; padding:20px;">No transactions yet. Add one above!</td></tr>';
                    updateStats([]);
                    return;
                }
                tbody.innerHTML = data.map(t => `
                    <tr>
                        <td>${t.date ? t.date.split(' ')[0] : ''}</td>
                        <td><span class="badge ${t.type}">${t.type}</span></td>
                        <td>${t.category}</td>
                        <td class="${t.type === 'income' ? 'amount-positive' : 'amount-negative'}">${t.type === 'income' ? '+' : '-'} ${Number(t.amount).toLocaleString()} FCFA</td>
                        <td>${t.description || '-'}</td>
                        <td><button class="btn btn-danger" style="padding:4px 12px; font-size:11px;" onclick="deleteTransaction(${t.id})">Delete</button></td>
                    </tr>
                `).join('');
                updateStats(data);
            });
    }
    
    function updateStats(data) {
        let income = 0, expenses = 0;
        data.forEach(t => {
            if (t.type === 'income') income += Number(t.amount);
            else expenses += Number(t.amount);
        });
        document.getElementById('totalIncome').textContent = income.toLocaleString() + ' FCFA';
        document.getElementById('totalExpenses').textContent = expenses.toLocaleString() + ' FCFA';
        const balance = income - expenses;
        const el = document.getElementById('balance');
        el.textContent = balance.toLocaleString() + ' FCFA';
        el.className = 'value ' + (balance >= 0 ? 'green' : 'red');
    }
    
    function addTransaction() {
        const type = document.getElementById('txType').value;
        const category = document.getElementById('txCategory').value;
        const amount = document.getElementById('txAmount').value;
        const date = document.getElementById('txDate').value;
        const description = document.getElementById('txDescription').value;
        if (!amount || amount <= 0) { alert('Please enter a valid amount'); return; }
        fetch('/api/transactions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, category, amount: parseFloat(amount), date, description })
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('txAmount').value = '';
            document.getElementById('txDescription').value = '';
            loadTransactions();
        });
    }
    
    function deleteTransaction(id) {
        if (!confirm('Delete this transaction?')) return;
        fetch(`/api/transactions/${id}`, { method: 'DELETE' })
            .then(() => loadTransactions());
    }
    
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.querySelector('.footer').textContent = 'BuSystem • Installed as App';
    }
</script>
</body>
</html>
