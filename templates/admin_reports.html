<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Admin Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: 700; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .content { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 12px; border-top: 1px solid #1a2332; padding-top: 15px; }
        h2 { color: #00d4ff; margin-bottom: 5px; }
        .sub { color: #7a8ba3; font-size: 13px; }
        .btn { background: #00d4ff; color: #0a0e17; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; text-decoration: none; display: inline-block; margin: 5px; }
        .btn:active { transform: scale(0.95); }
        .btn-pdf { background: #ff4757; color: #fff; }
        .btn-excel { background: #2ecc71; color: #fff; }
        .btn-primary { background: #00d4ff; color: #000; }
        .stat-box { background: #0f1a2b; padding: 12px 16px; border-radius: 8px; margin: 8px 0; border-left: 3px solid #00d4ff; }
        .stat-box .label { color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        .stat-box .value { font-size: 20px; font-weight: bold; margin-top: 4px; }
        .stat-box .value.green { color: #2ecc71; }
        .stat-box .value.red { color: #ff4757; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><img src="/static/icons/icon-192.png" alt="BuSystem" class="logo-icon"> BuSystem</div>
        <a href="/admin/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📄 Reports</h2>
    <p class="sub">Download reports for your work</p>
    
    <div class="content">
        <h3 style="color: #fff; margin-bottom: 12px;">📊 Sales Summary</h3>
        <div id="reportData">
            <div class="stat-box"><div class="label">Total Products Sold</div><div class="value green" id="repProductsSold">0</div></div>
            <div class="stat-box"><div class="label">Total Revenue</div><div class="value green" id="repRevenue">0 FCFA</div></div>
            <div class="stat-box"><div class="label">Total Sales</div><div class="value" id="repSalesCount">0</div></div>
        </div>
        <button class="btn" onclick="loadReport()">🔄 Refresh</button>
    </div>
    
    <div class="content">
        <h3 style="color: #fff; margin-bottom: 12px;">📥 Export Reports</h3>
        <div class="btn-group">
            <a href="/api/reports/export/sales/pdf" class="btn btn-pdf">📄 PDF Report</a>
            <a href="/api/reports/export/sales/excel" class="btn btn-excel">📊 Excel Report</a>
        </div>
    </div>
    
    <div class="footer">Every Franc Must Have a Job</div>
</div>

<script>
    loadReport();
    
    function loadReport() {
        fetch('/api/sales/report')
            .then(res => res.json())
            .then(data => {
                let totalRevenue = 0;
                let totalProducts = 0;
                data.product_sales.forEach(p => {
                    totalRevenue += p.revenue;
                    totalProducts += p.quantity;
                });
                document.getElementById('repProductsSold').textContent = totalProducts;
                document.getElementById('repRevenue').textContent = totalRevenue.toLocaleString() + ' FCFA';
                document.getElementById('repSalesCount').textContent = data.product_sales.length;
            });
    }
</script>
</body>
</html>
