<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - My Cash Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 16px; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: 700; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
        .logout { background: #ff4757; color: white; padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nav { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0; padding: 12px; background: #0f1a2b; border-radius: 12px; }
        .nav a { color: #7a8ba3; text-decoration: none; padding: 8px 14px; border-radius: 8px; transition: 0.2s; font-size: 13px; text-align: center; }
        .nav a:hover { background: #1a2a3f; color: #fff; }
        .nav a.active { background: #1a2a3f; color: #00d4ff; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-primary { background: #00d4ff; color: #0a0e17; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a3f; padding: 10px; text-align: left; color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2332; font-size: 13px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: #111a2b; padding: 30px; border-radius: 16px; max-width: 500px; width: 90%; border: 1px solid #1a2a3f; max-height: 90vh; overflow-y: auto; }
        .modal-content h2 { color: #fff; margin-bottom: 20px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 8px 0; background: #0f1a2b; border: 1px solid #1a2a3f; border-radius: 8px; color: #e0e6ed; font-size: 14px; }
        .modal-content input:focus, .modal-content select:focus { outline: none; border-color: #00d4ff; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        .footer { margin-top: 30px; text-align: center; color: #4a5a6f; font-size: 12px; border-top: 1px solid #1a2332; padding-top: 15px; }
        .user-info { color: #7a8ba3; font-size: 13px; }
        .role-badge { background: #1a2a3f; padding: 4px 12px; border-radius: 20px; font-size: 11px; color: #7a8ba3; }
        h2 { color: #fff; margin: 20px 0 10px 0; }
        .income { color: #2ecc71; }
        .expense { color: #ff6b6b; }
        .summary { display: flex; gap: 20px; flex-wrap: wrap; margin: 15px 0; padding: 15px; background: #0f1a2b; border-radius: 12px; }
        .summary-item { flex: 1; min-width: 100px; }
        .summary-item .label { color: #7a8ba3; font-size: 11px; text-transform: uppercase; }
        .summary-item .value { font-size: 20px; font-weight: bold; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><img src="/static/icons/icon-192.png" alt="BuSystem" class="logo-icon"> BuSystem</div>
        <div>
            <span class="user-info">👤 {{ user.username }}</span>
            <span class="role-badge">User</span>
            <form action="{{ url_for('logout') }}" method="get" style="display:inline;">
                <button class="logout">Logout</button>
            </form>
        </div>
    </div>

    <div class="nav">
        <a href="/user/dashboard">📊 My Dashboard</a>
        <a href="/user/cashflow" class="active">💰 Cash Flow</a>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
        <h2 style="margin:0;">💰 My Cash Flow</h2>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Transaction</button>
    </div>

    <div class="summary" id="summary">
        <div class="summary-item"><div class="label">💰 Total Income</div><div class="value income" id="totalIncome">0</div></div>
        <div class="summary-item"><div class="label">💸 Total Expenses</div><div class="value expense" id="totalExpense">0</div></div>
        <div class="summary-item"><div class="label">💎 Balance</div><div class="value" id="balance" style="color:#00d4ff;">0</div></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th><th>Description</th><th>Actions</th></tr>
            </thead>
            <tbody id="transactionsTable">
                <tr><td colspan="6" style="text-align:center; padding:20px; color:#4a5a6f;">Loading transactions...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <h2>Add Transaction</h2>
            <select id="txnType">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <input type="text" id="txnCategory" placeholder="Category (e.g., Salary, Food, Transport)">
            <input type="number" id="txnAmount" placeholder="Amount" step="0.01">
            <input type="date" id="txnDate">
            <input type="text" id="txnDescription" placeholder="Description (optional)">
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
                <button class="btn btn-success" onclick="saveTransaction()">Save</button>
            </div>
        </div>
    </div>

    <div class="footer">BuSystem • Every Franc Must Have a Job</div>
</div>

<script>
    let transactions = [];
    let summary = {};

    async function loadData() {
        await Promise.all([loadTransactions(), loadSummary()]);
    }

    async function loadTransactions() {
        try {
            const res = await fetch('/api/user/transactions');
            transactions = await res.json();
            renderTransactions();
        } catch (e) {
            document.getElementById('transactionsTable').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:#ff4757;">Error loading transactions</td></tr>';
        }
    }

    async function loadSummary() {
        try {
            const res = await fetch('/api/user/transactions');
            const data = await res.json();
            let totalIncome = 0, totalExpense = 0;
            data.forEach(t => {
                if (t.type === 'income') totalIncome += t.amount;
                else totalExpense += t.amount;
            });
            document.getElementById('totalIncome').textContent = totalIncome.toFixed(0);
            document.getElementById('totalExpense').textContent = totalExpense.toFixed(0);
            document.getElementById('balance').textContent = (totalIncome - totalExpense).toFixed(0);
        } catch (e) { console.error('Error loading summary'); }
    }

    function renderTransactions() {
        const tbody = document.getElementById('transactionsTable');
        if (transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:#4a5a6f;">No transactions yet</td></tr>';
            return;
        }
        tbody.innerHTML = transactions.map(t => `
            <tr>
                <td>${t.date ? t.date.split(' ')[0] : '-'}</td>
                <td class="${t.type}">${t.type}</td>
                <td>${t.category}</td>
                <td class="${t.type}">${t.amount.toFixed(0)}</td>
                <td>${t.description || '-'}</td>
                <td><button class="btn btn-danger" onclick="deleteTransaction(${t.id})" style="padding:4px 8px;font-size:11px;">🗑️</button></td>
            </tr>
        `).join('');
    }

    function openAddModal() {
        document.getElementById('txnType').value = 'income';
        document.getElementById('txnCategory').value = '';
        document.getElementById('txnAmount').value = '';
        document.getElementById('txnDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('txnDescription').value = '';
        document.getElementById('transactionModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('transactionModal').style.display = 'none';
    }

    async function saveTransaction() {
        const data = {
            type: document.getElementById('txnType').value,
            category: document.getElementById('txnCategory').value,
            amount: parseFloat(document.getElementById('txnAmount').value),
            date: document.getElementById('txnDate').value,
            description: document.getElementById('txnDescription').value
        };

        if (!data.category || isNaN(data.amount) || data.amount <= 0) {
            alert('Please fill all required fields');
            return;
        }

        try {
            const res = await fetch('/api/user/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.status === 'success') {
                closeModal();
                loadData();
            } else {
                alert('Error: ' + (result.error || 'Unknown error'));
            }
        } catch (e) {
            alert('Error saving transaction');
        }
    }

    async function deleteTransaction(id) {
        if (!confirm('Delete this transaction?')) return;
        try {
            const res = await fetch('/api/user/transactions', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            const result = await res.json();
            if (result.status === 'success') {
                loadData();
            } else {
                alert('Error deleting transaction');
            }
        } catch (e) {
            alert('Error deleting transaction');
        }
    }

    document.getElementById('transactionModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadData();
</script>
</body>
</html>
