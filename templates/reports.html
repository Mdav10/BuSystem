<!DOCTYPE html>
<html>
<head>
    <title>BuSystem - Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e17; color: #e0e6ed; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a2332; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .back { color: #7a8ba3; text-decoration: none; padding: 8px 16px; background: #1a2a3f; border-radius: 8px; }
        .card { background: #111a2b; border-radius: 16px; padding: 24px; border: 1px solid #1a2a3f; margin: 20px 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .btn { background: #00d4ff; color: #0a0e17; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; text-decoration: none; display: inline-block; text-align: center; }
        .btn:hover { background: #00ff88; transform: scale(1.03); }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-success:hover { background: #27ae60; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #e67e22; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #ff6b81; }
        h2 { color: #00d4ff; margin: 20px 0; }
        .stat-box { background: #0f1a2b; padding: 15px; border-radius: 12px; border-left: 4px solid #00d4ff; margin: 10px 0; }
        .stat-box .label { color: #7a8ba3; font-size: 12px; text-transform: uppercase; }
        .stat-box .value { font-size: 24px; font-weight: bold; margin-top: 5px; }
        .stat-box .value.green { color: #2ecc71; }
        .stat-box .value.red { color: #ff4757; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💰 BuSystem</div>
        <a href="/dashboard" class="back">← Dashboard</a>
    </div>
    
    <h2>📄 Reports</h2>
    
    <div class="grid-2">
        <div class="card">
            <h3 style="color: #fff;">Income Statement</h3>
            <div id="incomeData">
                <div class="stat-box"><div class="label">Total Income</div><div class="value green" id="repIncome">0 FCFA</div></div>
                <div class="stat-box"><div class="label">Total Expenses</div><div class="value red" id="repExpenses">0 FCFA</div></div>
                <div class="stat-box"><div class="label">Net Income</div><div class="value" id="repNet">0 FCFA</div></div>
            </div>
            <button class="btn btn-success" onclick="loadIncomeStatement()" style="margin-top:15px;">🔄 Refresh</button>
        </div>
        
        <div class="card">
            <h3 style="color: #fff;">Balance Sheet</h3>
            <div id="balanceData">
                <div class="stat-box"><div class="label">Total Assets</div><div class="value green" id="repAssets">0 FCFA</div></div>
                <div class="stat-box"><div class="label">Net Worth</div><div class="value" id="repNetWorth">0 FCFA</div></div>
            </div>
            <button class="btn btn-success" onclick="loadBalanceSheet()" style="margin-top:15px;">🔄 Refresh</button>
        </div>
    </div>
    
    <div class="card">
        <h3 style="color: #fff;">Export Reports</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
            <a href="/api/reports/export/transactions/pdf" class="btn btn-warning">📄 PDF Report</a>
            <a href="/api/reports/export/transactions/excel" class="btn btn-success">📊 Excel Report</a>
            <a href="/api/reports/income_statement" class="btn" target="_blank">📋 View Income Statement (JSON)</a>
            <a href="/api/reports/balance_sheet" class="btn" target="_blank">📊 View Balance Sheet (JSON)</a>
        </div>
    </div>
    
    <div class="footer" style="margin-top:30px; text-align:center; color:#4a5a6f; border-top:1px solid #1a2332; padding-top:15px;">
        Every Franc Must Have a Job
    </div>
</div>

<script>
    loadIncomeStatement();
    loadBalanceSheet();
    
    function loadIncomeStatement() {
        fetch('/api/reports/income_statement')
            .then(res => res.json())
            .then(data => {
                let totalIncome = 0, totalExpenses = 0;
                data.income.forEach(i => totalIncome += i.total);
                data.expenses.forEach(e => totalExpenses += e.total);
                document.getElementById('repIncome').textContent = totalIncome.toLocaleString() + ' FCFA';
                document.getElementById('repExpenses').textContent = totalExpenses.toLocaleString() + ' FCFA';
                const net = totalIncome - totalExpenses;
                const el = document.getElementById('repNet');
                el.textContent = net.toLocaleString() + ' FCFA';
                el.className = 'value ' + (net >= 0 ? 'green' : 'red');
            });
    }
    
    function loadBalanceSheet() {
        fetch('/api/reports/balance_sheet')
            .then(res => res.json())
            .then(data => {
                document.getElementById('repAssets').textContent = data.total_assets.toLocaleString() + ' FCFA';
                document.getElementById('repNetWorth').textContent = data.net_worth.toLocaleString() + ' FCFA';
            });
    }
</script>
</body>
</html>
