services:
  - type: web
    name: busystem
    env: python
    buildCommand: |
      pip install -r requirements.txt
      flask init-db
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: busystem_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
    plan: free
